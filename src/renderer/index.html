  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='600' height='800'><g font-family='monospace' font-size='11' fill='%2300ffd5' opacity='.40'><text x='20' y='20'>[boot] init kernel 4.0.7-asura</text><text x='20' y='40'>[ ok ] mounting /dev/sda1</text><text x='20' y='60'>[ ok ] starting daemon: scanner</text><text x='20' y='80'>[ ok ] starting daemon: bot-watcher</text><text x='20' y='100'>[ ok ] starting daemon: docker-bridge</text><text x='20' y='120'>[info] no container runtime</text><text x='20' y='140'>[ ok ] tray icon registered</text><text x='20' y='160'>[ ok ] http server :27315</text><text x='20' y='180'>[ ok ] ipc handler ready</text><text x='20' y='200'>[done] asura phantom online</text><text x='20' y='240'>$ scan workspace</text><text x='20' y='260'>found 15 projects · ok</text><text x='20' y='280'>parsed git logs · ok</text><text x='20' y='300'>cached commits · ok</text><text x='20' y='320'>$ _</text><text x='20' y='400'>[boot] init kernel 4.0.7-asura</text><text x='20' y='420'>[ ok ] mounting /dev/sda1</text><text x='20' y='440'>[ ok ] starting daemon: scanner</text></g></svg>");
  background-repeat: repeat-y;
  animation: ghost-scroll 40s linear infinite;
}
@keyframes ghost-scroll { from { background-position: 0 0; } to { background-position: 0 -800px; } }

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100vh; overflow: hidden;
  background: #06030c;
  color: var(--ink-0);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 13px;
  line-height: 1.4;
  user-select: none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -.005em;
}

body.theme-dark {
  background:
    linear-gradient(180deg,
      #1a0428 0%,
      #3d0d4e 22%,
      #5d1265 38%,
      #3a1056 60%,
      #1a0a3d 80%,
      #080418 100%);
  background-attachment: fixed;
}

/* sun glow */
body.theme-dark::before {
  content: '';
  position: fixed;
  left: 50%; top: 120px;
  width: 720px; height: 720px;
  transform: translateX(-50%);
  background: radial-gradient(circle,
    rgba(255, 140, 66, .18) 0%,
    rgba(255, 46, 147, .12) 35%,
    transparent 65%);
  pointer-events: none; z-index: 0;
}

/* faint stars */
body.theme-dark::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  opacity: .25;
  background-image:
    radial-gradient(1px 1px at 8% 6%,  #fff, transparent),
    radial-gradient(1px 1px at 22% 14%, #fff, transparent),
    radial-gradient(1px 1px at 41% 4%,  #fff, transparent),
    radial-gradient(1px 1px at 58% 11%, #fff, transparent),
    radial-gradient(1px 1px at 76% 5%,  #fff, transparent),
    radial-gradient(1px 1px at 88% 14%, #fff, transparent),
    radial-gradient(1px 1px at 6% 68%,  #fff, transparent),
    radial-gradient(1px 1px at 92% 76%, #fff, transparent),
    radial-gradient(1px 1px at 32% 90%, #fff, transparent),
    radial-gradient(1px 1px at 67% 86%, #fff, transparent);
}

.root {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100vh;
  box-shadow:
    inset 0 0 0 1px rgba(160, 50, 255, .15),
    inset 0 0 80px -10px rgba(255, 46, 147, .25);
}

/* ─── Titlebar ─────────────────────────────────────── */
.tb {
  -webkit-app-region: drag;
  height: 44px;
  background: linear-gradient(90deg, rgba(255, 46, 147, .12), rgba(92, 255, 255, .08));
  border-bottom: 1px solid var(--line-2);
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 14px 0 18px;
  flex-shrink: 0;
  position: relative; z-index: 5;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-mark {
  width: 26px; height: 26px;
  display: grid; place-items: center;
  filter: drop-shadow(0 0 8px rgba(255, 46, 147, .5)) drop-shadow(0 0 14px rgba(92, 255, 255, .25));
  flex-shrink: 0;
}
.brand-mark svg {
  width: 100%; height: 100%;
  display: block;
  animation: brand-float 4.5s ease-in-out infinite;
}
@keyframes brand-float {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-2px); }
}
.brand > div:not(.brand-mark) {
  display: flex; flex-direction: column;
  gap: 0;
}
.brand-name {
  font-family: 'Audiowide', cursive;
  font-weight: 400;
  font-size: 14px;
  letter-spacing: .18em;
  color: var(--ink-0);
  text-shadow: 0 0 12px rgba(255, 46, 147, .6);
  text-transform: uppercase;
}
.brand-sub {
  font-family: 'Major Mono Display', monospace;
  font-size: 9px;
  color: var(--cyan);
  letter-spacing: .18em;
  text-transform: lowercase;
  opacity: .75;
}

/* stat-mini chips in titlebar */
.tb-stats {
  display: flex; gap: 14px;
  font-family: 'JetBrains Mono', monospace;
  -webkit-app-region: no-drag;
}
.stat-mini {
  display: inline-flex; align-items: baseline; gap: 6px;
  padding: 4px 10px;
  background: rgba(20, 8, 40, .5);
  border: 1px solid var(--line-2);
  font-size: 10px;
  letter-spacing: .14em;
  color: var(--ink-1);
  text-transform: uppercase;
}
.stat-mini b {
  font-family: 'Audiowide', cursive;
  font-weight: 400;
  font-size: 16px;
  letter-spacing: .04em;
  background: linear-gradient(135deg, var(--pink), var(--cyan));
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  filter: drop-shadow(0 0 8px rgba(255, 46, 147, .5));
}
.stat-mini.c b { background: linear-gradient(135deg, var(--cyan), var(--violet)); -webkit-background-clip: text; background-clip: text; color: transparent; filter: drop-shadow(0 0 8px rgba(92, 255, 255, .5)); }
.stat-mini.v b { background: linear-gradient(135deg, var(--sun), var(--pink));   -webkit-background-clip: text; background-clip: text; color: transparent; filter: drop-shadow(0 0 8px rgba(255, 140, 66, .5)); }
.stat-mini .pip { display: none; }

.tb-actions { display: flex; gap: 4px; -webkit-app-region: no-drag; }
.icon-btn {
  width: 28px; height: 28px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--ink-1);
  cursor: pointer;
  display: grid; place-items: center;
  transition: color .18s, background .18s, border-color .18s;
}
.icon-btn svg {
  width: 14px; height: 14px;
  stroke-width: 1.8;
}
.icon-btn:hover {
  color: var(--cyan);
  background: rgba(92, 255, 255, .08);
  border-color: var(--cyan-line);
  text-shadow: 0 0 8px var(--cyan);
}
.icon-btn:hover svg { filter: drop-shadow(0 0 6px rgba(92, 255, 255, .7)); }
.icon-btn.active {
  color: var(--pink);
  background: rgba(255, 46, 147, .1);
  border-color: var(--pink);
}
.icon-btn.close:hover {
  color: #fff;
  background: linear-gradient(135deg, var(--pink), var(--sun));
  border-color: var(--pink);
}

/* ─── Tabs ─────────────────────────────────────────── */
.tabs {
  display: flex;
  background: rgba(20, 8, 40, .65);
  border-bottom: 1px solid var(--line-2);
  flex-shrink: 0;
  position: relative; z-index: 4;
}
.tab {
  padding: 10px 22px;
  display: flex; align-items: center; gap: 10px;
  border: 0;
  border-right: 1px solid var(--line-2);
  background: transparent;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--ink-2);
  cursor: pointer;
  position: relative;
  transition: color .18s, background .18s;
}
.tab svg { width: 14px; height: 14px; }
.tab:hover { color: var(--ink-1); }
.tab.on {
  color: var(--ink-0);
  background: linear-gradient(180deg, rgba(255, 46, 147, .14), transparent);
}
.tab.on::after {
  content: '';
  position: absolute; left: 0; right: 0; bottom: -1px;
  height: 2px;
  background: linear-gradient(90deg, var(--pink), var(--cyan));
  box-shadow: 0 0 14px rgba(255, 46, 147, .6);
}
.tab-c {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 400;
  color: var(--ink-2);
  letter-spacing: .04em;
}
.tab.on .tab-c { color: var(--pink); }
.tab.has-alert .tab-c {
  color: var(--sun);
  animation: pulse-alert 1.4s ease-in-out infinite;
}
@keyframes pulse-alert {
  50% { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }
}

/* ─── Toolbar ──────────────────────────────────────── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 18px;
  background: rgba(20, 8, 40, .45);
  border-bottom: 1px solid var(--line-2);
  flex-shrink: 0;
  position: relative; z-index: 3;
}
.search-wrap {
  flex: 1;
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  border: 1px solid var(--line-2);
  background: rgba(20, 8, 40, .5);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  transition: border-color .2s, box-shadow .2s, background .2s;
}
.search-wrap:focus-within {
  border-color: var(--cyan);
  background: rgba(92, 255, 255, .04);
  box-shadow: 0 0 0 1px var(--cyan-soft), 0 0 16px rgba(92, 255, 255, .15);
}
.search-icon {
  display: grid; place-items: center;
  color: var(--cyan);
}
.search-icon svg { width: 12px; height: 12px; filter: drop-shadow(0 0 6px rgba(92, 255, 255, .55)); }
.search {
  flex: 1;
  border: 0; outline: 0;
  background: transparent;
  color: var(--ink-0);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  caret-color: var(--pink);
  letter-spacing: .02em;
}
.search::placeholder { color: var(--ink-2); }
.kbd {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  border: 1px solid var(--line-2);
  padding: 1px 6px;
  color: var(--ink-1);
  background: rgba(20, 8, 40, .6);
}
.filter {
  display: flex;
  gap: 6px;
}
.fbtn {
  padding: 5px 12px;
  border: 1px solid var(--line-2);
  background: rgba(20, 8, 40, .5);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--ink-1);
  cursor: pointer;
  transition: all .18s;
}
.fbtn:hover {
  border-color: var(--cyan);
  color: var(--cyan);
  background: rgba(92, 255, 255, .08);
}
.fbtn.on {
  background: linear-gradient(135deg, var(--pink), var(--violet));
  border-color: var(--pink);
  color: #fff;
  box-shadow: 0 0 18px rgba(255, 46, 147, .45);
  text-shadow: 0 0 6px rgba(255, 255, 255, .35);
}

/* ─── Main grid area ───────────────────────────────── */
.main {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 18px;
  position: relative;
  z-index: 2;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 14px;
}
@media (max-width: 720px) {
  .grid { grid-template-columns: 1fr; }
}

.skeleton {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 14px;
}
.sk-card {
  height: 188px;
  background: rgba(20, 8, 40, .35);
  border: 1px solid var(--line-2);
  position: relative;
  overflow: hidden;
}
.sk-card::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(110deg, transparent 30%, rgba(92, 255, 255, .08) 50%, transparent 70%);
  animation: sk-shimmer 1.6s linear infinite;
}
@keyframes sk-shimmer {
  to { transform: translateX(100%); }
}

.placeholder {
  text-align: center;
  padding: 80px 30px 60px;
  color: var(--ink-1);
  background: rgba(20, 8, 40, .35);
  border: 1px solid var(--line-2);
  margin: 12px 0;
}
.placeholder-icon {
  width: 48px; height: 48px;
  margin: 0 auto 14px;
  color: var(--cyan);
  opacity: .65;
}
.placeholder-icon svg { width: 100%; height: 100%; filter: drop-shadow(0 0 8px rgba(92, 255, 255, .35)); }
.placeholder h3 {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: .04em;
  color: var(--ink-0);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.placeholder p {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-1);
  margin: 4px 0;
}
.placeholder code {
  font-family: 'JetBrains Mono', monospace;
  background: rgba(92, 255, 255, .08);
  border: 1px solid var(--cyan-line);
  color: var(--cyan);
  padding: 1px 6px;
}

/* ─── Project Card ─────────────────────────────────── */
.pcard {
  position: relative;
  background: linear-gradient(180deg, rgba(40, 16, 72, .85), rgba(20, 8, 40, .92));
  display: flex;
  flex-direction: column;
  padding: 0;
  cursor: pointer;
  isolation: isolate;
  transition: transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s;
  overflow: hidden;
}
.pcard::after {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--ink-3);
  z-index: 1;
  pointer-events: none;
  transition: background .2s, box-shadow .2s;
}
.pcard.s-active::after  { background: linear-gradient(180deg, var(--cyan), var(--violet)); box-shadow: 0 0 14px var(--cyan-line); }
.pcard.s-recent::after  { background: linear-gradient(180deg, var(--violet), var(--pink)); }
.pcard.s-idle::after    { background: var(--sun);  opacity: .55; }
.pcard.s-archived::after{ background: var(--ink-3); opacity: .35; }
.pcard.fav::after       { background: linear-gradient(180deg, var(--sun), var(--pink)); box-shadow: 0 0 14px var(--amber-line); }
.pcard::before {
  content: '';
  position: absolute; inset: 0;
  padding: 1.5px;
  background: linear-gradient(135deg, var(--pink) 0%, var(--violet) 50%, var(--cyan) 100%);
  background-size: 200% 200%;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  z-index: -1;
  pointer-events: none;
  animation: edge-slide 8s ease-in-out infinite;
}
@keyframes edge-slide {
  0%, 100% { background-position: 0% 50%; }
  50%      { background-position: 100% 50%; }
}
.pcard.fav::before {
  background: linear-gradient(135deg, var(--sun), var(--pink) 50%, var(--cyan));
  background-size: 200% 200%;
}
.pcard.s-idle,
.pcard.s-archived { opacity: .65; }
.pcard.s-idle::before,
.pcard.s-archived::before {
  background: linear-gradient(135deg, var(--ink-3), var(--line-2));
}
.pcard:hover {
  transform: translateY(-2px);
  box-shadow:
    0 14px 36px rgba(0, 0, 0, .55),
    0 0 30px rgba(255, 46, 147, .15);
}
.pcard.fav:hover {
  box-shadow:
    0 14px 36px rgba(0, 0, 0, .55),
    0 0 30px rgba(255, 140, 66, .25);
}

/* favorite star button */
.pcard-fav-star {
  position: absolute; top: 8px; right: 8px;
  width: 24px; height: 24px;
  border: 0;
  background: transparent;
  color: var(--ink-2);
  cursor: pointer;
  z-index: 2;
  display: grid; place-items: center;
  transition: color .18s, transform .18s;
}
.pcard-fav-star svg { width: 14px; height: 14px; }
.pcard-fav-star:hover { color: var(--sun); transform: scale(1.15); }
.pcard.fav .pcard-fav-star {
  color: var(--sun);
  filter: drop-shadow(0 0 6px rgba(255, 140, 66, .65));
}

/* top row: status dot + title + path */
.pc-top {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 11px 40px 4px 16px;
}
.pc-stat-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 8px;
  background: var(--ink-2);
  box-shadow: 0 0 0 2px rgba(20, 8, 40, .8);
}
.pc-stat-dot.active   { background: var(--cyan);   box-shadow: 0 0 8px rgba(92, 255, 255, .8), 0 0 0 2px rgba(20, 8, 40, .8); animation: dot-pulse 2.4s ease-in-out infinite; }
.pc-stat-dot.recent   { background: var(--ink-1); }
.pc-stat-dot.idle     { background: var(--sun);    box-shadow: 0 0 6px rgba(255, 140, 66, .55), 0 0 0 2px rgba(20, 8, 40, .8); }
.pc-stat-dot.archived { background: var(--ink-3); }
@keyframes dot-pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.25); opacity: .7; }
}

.pc-title { flex: 1; min-width: 0; }
.pc-name {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 20px;
  line-height: 1.15;
  color: var(--ink-0);
  letter-spacing: .01em;
  word-break: break-word;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
}
.pcard.s-active .pc-name {
  background: linear-gradient(90deg, var(--ink-0), var(--cyan));
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  filter: drop-shadow(0 0 8px rgba(92, 255, 255, .35));
}
.pcard.fav .pc-name {
  background: linear-gradient(90deg, var(--sun), var(--pink));
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  filter: drop-shadow(0 0 8px rgba(255, 140, 66, .35));
}
.pc-path {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-2);
  margin-top: 2px;
}
.pc-new-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-left: 8px;
  padding: 1px 4px 1px 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: .12em;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  color: #06030c;
  font-weight: 700;
  vertical-align: middle;
  cursor: default;
}
.pc-new-x {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 12px; height: 12px;
  border-radius: 2px;
  cursor: pointer;
  font-size: 11px;
  line-height: 1;
  opacity: .7;
  transition: opacity .12s, background .12s;
}
.pc-new-x:hover { opacity: 1; background: rgba(6, 3, 12, .25); }

/* unified tag row: stack chips + status badges together */
.pc-tags {
  display: flex; gap: 5px;
  padding: 4px 14px 6px 16px;
  flex-wrap: wrap;
  align-items: center;
}
.pc-tags:empty { display: none; }

/* legacy compat */
.pc-badges {
  display: flex; gap: 6px;
  padding: 6px 14px 4px;
  flex-wrap: wrap;
}
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: .1em;
  text-transform: uppercase;
  border: 1px solid var(--line-2);
  background: rgba(20, 8, 40, .5);
  color: var(--ink-1);
  border-radius: 2px;
}
.badge svg { width: 10px; height: 10px; }
.badge.dev   { color: var(--cyan); border-color: var(--cyan); background: rgba(92, 255, 255, .08); text-shadow: 0 0 6px rgba(92, 255, 255, .5); }
.badge.prod  {
  color: var(--cyan);
  border-color: var(--cyan);
  background: linear-gradient(90deg, rgba(92, 255, 255, .14), rgba(255, 46, 147, .12));
  text-shadow: 0 0 6px rgba(92, 255, 255, .55);
  cursor: pointer;
  transition: all .18s;
  letter-spacing: .06em;
  text-transform: lowercase;
  font-weight: 600;
}
.badge.prod:hover {
  background: linear-gradient(90deg, var(--cyan), var(--pink));
  color: #06030c;
  border-color: var(--pink);
  text-shadow: none;
  box-shadow: 0 0 14px rgba(92, 255, 255, .55), 0 0 22px rgba(255, 46, 147, .35);
  transform: translateY(-1px);
}
.badge.bot   { color: var(--pink); border-color: var(--pink); background: rgba(255, 46, 147, .08); }
.badge.dirty { color: var(--sun);  border-color: var(--sun);  background: rgba(255, 140, 66, .08); }

/* stack chips */
.pc-stack {
  display: flex; gap: 5px;
  padding: 4px 14px 8px;
  flex-wrap: wrap;
}
.chip {
  display: inline-block;
  padding: 2px 7px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: .04em;
  background: rgba(40, 16, 72, .55);
  border: 1px solid var(--line-2);
  color: var(--ink-0);
  border-radius: 2px;
}
.chip[data-s="Next.js"i],
.chip[data-s*="next"i]    { color: var(--cyan); border-color: var(--cyan); background: rgba(92, 255, 255, .06); }
.chip[data-s*="python"i]  { color: var(--cyan); border-color: var(--cyan); background: rgba(92, 255, 255, .06); }
.chip[data-s*="fastapi"i] { color: var(--ink-0); }
.chip[data-s*="postgres"i],
.chip[data-s*="sqlite"i],
.chip[data-s*="redis"i]   { color: var(--ink-0); }
.chip[data-s*="ocr"i],
.chip[data-s*="d3"i],
.chip[data-s*="ai"i]      { color: var(--pink); border-color: var(--pink); background: rgba(255, 46, 147, .06); }
.chip[data-s*="prom"i]    { color: var(--sun);  border-color: var(--sun);  background: rgba(255, 140, 66, .06); }
.chip[data-s*="electron"i],
.chip[data-s*="rust"i],
.chip[data-s*="go"i]      { color: var(--violet); border-color: var(--violet-line); }

/* meta rows (branch, commit) */
.pc-meta {
  padding: 8px 14px 8px 16px;
  border-top: 1px solid rgba(255, 46, 147, .08);
  display: flex; flex-direction: column;
  gap: 4px;
  flex: 1;
}
.pc-meta:empty { display: none; padding: 0; border: 0; }
.pc-meta-row {
  display: flex; align-items: center; gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--ink-1);
  min-width: 0;
}
.pc-meta-icon {
  display: grid; place-items: center;
  color: var(--cyan);
  flex-shrink: 0;
}
.pc-meta-icon svg { width: 12px; height: 12px; opacity: .8; }
.pc-meta-v {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.pc-meta-v b {
  color: var(--cyan);
  font-weight: 500;
}
.ahead  { color: var(--sun); margin-left: 4px; }
.behind { color: var(--pink); margin-left: 4px; }
.pc-meta-time {
  font-size: 9.5px;
  color: var(--ink-2);
  flex-shrink: 0;
}

/* commit sparkline (14d bar chart) — always rendered */
.pc-spark {
  display: flex; align-items: flex-end; gap: 2px;
  height: 18px;
  padding: 2px 14px 4px 16px;
}
.pc-spark-bar {
  flex: 1;
  background: rgba(255, 46, 147, .08);
  min-height: 2px;
  border-radius: 1px;
  transition: height .3s;
}
.pc-spark-bar.has   { background: linear-gradient(180deg, var(--pink), var(--violet)); }
.pc-spark-bar.today { background: linear-gradient(180deg, var(--cyan), var(--pink)); box-shadow: 0 0 6px var(--cyan-line); }

/* actions row */
.pc-actions {
  display: flex;
  gap: 0;
  border-top: 1px solid rgba(255, 46, 147, .12);
  background: rgba(8, 3, 16, .55);
}
.ab {
  flex: 1;
  border: 0;
  border-right: 1px solid rgba(255, 46, 147, .08);
  background: transparent;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 10.5px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--ink-2);
  padding: 7px 8px;
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
  transition: background .15s, color .15s;
}
.ab:last-child { border-right: 0; }
.ab svg { width: 12px; height: 12px; flex-shrink: 0; }
.ab:hover {
  background: rgba(92, 255, 255, .08);
  color: var(--cyan);
}
.ab.primary {
  color: var(--cyan);
  text-shadow: 0 0 6px rgba(92, 255, 255, .35);
}
.ab.primary:hover {
  background: linear-gradient(90deg, var(--cyan), var(--pink));
  color: #1a0428;
  text-shadow: none;
}
.ab.icon-only {
  flex: 0 0 34px;
  padding: 7px 0;
}
.ab.icon-only svg { width: 13px; height: 13px; }
.ab.icon-only:last-of-type { border-right: 0; }

/* ─── Bots tab ─────────────────────────────────────── */
.bots-wrap {
  display: flex; flex-direction: column;
  gap: 18px;
}
.bots-section-h {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--ink-2);
  padding-left: 4px;
}
.bots-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.bot-hero, .bot-mini {
  position: relative;
  background: linear-gradient(180deg, rgba(40, 16, 72, .85), rgba(20, 8, 40, .92));
  padding: 14px 16px 12px;
  isolation: isolate;
}
.bot-hero::before, .bot-mini::before {
  content: '';
  position: absolute; inset: 0;
  padding: 1.5px;
  background: linear-gradient(135deg, var(--pink), var(--violet) 50%, var(--cyan));
  background-size: 200% 200%;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  z-index: -1;
  animation: edge-slide 10s ease-in-out infinite;
}
.bot-hero.s-running::before { background: linear-gradient(135deg, var(--cyan), var(--pink), var(--cyan)); background-size: 200% 200%; }
.bot-hero.s-crashed::before { background: linear-gradient(135deg, var(--pink), var(--sun)); background-size: 200% 200%; }
.bot-hero.s-done::before    { background: linear-gradient(135deg, var(--violet), var(--cyan)); background-size: 200% 200%; }
.bh-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
.bh-info { flex: 1; }
.bh-name {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 18px;
  color: var(--ink-0);
  letter-spacing: .02em;
}
.bh-proj {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-2);
  margin-top: 2px;
}
.bh-status {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: .18em;
  text-transform: uppercase;
  border: 1px solid var(--cyan);
  color: var(--cyan);
  background: rgba(92, 255, 255, .08);
  white-space: nowrap;
}
.bh-status .ddot {
  width: 5px; height: 5px;
  background: currentColor;
  box-shadow: 0 0 6px currentColor;
  animation: dot-pulse 1.6s ease-in-out infinite;
}
.bh-status.running { color: var(--cyan); border-color: var(--cyan); background: rgba(92, 255, 255, .08); }
.bh-status.paused, .bh-status.idle, .bh-status.stuck { color: var(--sun); border-color: var(--sun); background: rgba(255, 140, 66, .08); }
.bh-status.done    { color: var(--violet); border-color: var(--violet); background: var(--violet-soft); }
.bh-status.crashed { color: var(--pink); border-color: var(--pink); background: rgba(255, 46, 147, .08); }

.bh-body {
  display: flex; gap: 18px;
  align-items: center;
}
.bh-ring-wrap {
  flex-shrink: 0;
}
.bh-stats {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 9px 14px;
}
.bh-stat-l {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink-2);
  margin-bottom: 2px;
}
.bh-stat-v {
  font-family: 'Audiowide', cursive;
  font-weight: 400;
  font-size: 18px;
  color: var(--ink-0);
  font-feature-settings: 'tnum';
  line-height: 1;
}
.bh-stat-v.red { color: var(--pink); text-shadow: 0 0 6px rgba(255, 46, 147, .55); }
.bh-current {
  margin-top: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--cyan);
  background: rgba(92, 255, 255, .06);
  border-left: 2px solid var(--cyan);
  padding: 6px 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bh-spark {
  margin-top: 12px;
  border-top: 1px dashed rgba(160, 50, 255, .25);
  padding-top: 10px;
}
.bh-spark-hdr {
  display: flex; justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--ink-2);
  margin-bottom: 6px;
}
.bh-spark-hdr b {
  color: var(--cyan);
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: none;
}
.bh-anomaly {
  margin-top: 10px;
  padding: 8px 12px;
  background: rgba(255, 140, 66, .12);
  border: 1px solid var(--sun);
  color: var(--sun);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
}
.bh-errors {
  margin-top: 8px;
  padding: 8px 12px;
  background: rgba(255, 46, 147, .12);
  border: 1px solid var(--pink);
  color: var(--ink-0);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
}
.bh-errors b { color: var(--pink); }
.bh-actions {
  display: flex; gap: 6px;
  margin-top: 12px;
}
.bh-actions .ab {
  flex: 0 0 auto;
  padding: 7px 14px;
  border: 1px solid var(--line-2);
}
.bh-actions .ab:hover {
  border-color: var(--cyan);
  background: rgba(92, 255, 255, .08);
  color: var(--cyan);
}

.bm-top {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 10px;
  gap: 8px;
}
.bm-name {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: var(--ink-0);
  letter-spacing: .02em;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.bm-prog {
  display: flex; align-items: center; gap: 12px;
}
.bm-prog-info { flex: 1; min-width: 0; }
.bm-prog-num {
  font-family: 'Audiowide', cursive;
  font-size: 16px;
  color: var(--ink-0);
}
.bm-prog-target { color: var(--ink-2); font-size: 12px; }
.bm-prog-rate {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-2);
  margin-top: 2px;
}
.bot-clear {
  background: transparent;
  border: 1px solid var(--line-2);
  color: var(--ink-2);
  width: 22px; height: 22px;
  display: grid; place-items: center;
  cursor: pointer;
  transition: all .15s;
}
.bot-clear:hover { color: var(--pink); border-color: var(--pink); background: rgba(255, 46, 147, .1); }
.bot-clear svg { width: 11px; height: 11px; }

/* ─── Alerts ───────────────────────────────────────── */
.alerts-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
  padding: 0 4px;
}
.alerts-toolbar h3 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-0);
  font-weight: 700;
}
.alerts-clear {
  background: transparent;
  border: 1px solid var(--line-2);
  color: var(--ink-1);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 10px;
  letter-spacing: .18em;
  text-transform: uppercase;
  padding: 5px 12px;
  cursor: pointer;
  transition: all .18s;
}
.alerts-clear:hover { color: var(--pink); border-color: var(--pink); }

.alerts-list {
  display: flex; flex-direction: column;
  gap: 8px;
}
.alert-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 14px;
  background: linear-gradient(180deg, rgba(40, 16, 72, .65), rgba(20, 8, 40, .85));
  border: 1px solid var(--line-2);
  border-left-width: 2px;
}
.alert-row.k-bot-crashed { border-left-color: var(--pink); }
.alert-row.k-bot-stuck   { border-left-color: var(--sun); }
.alert-row.k-bot-done    { border-left-color: var(--cyan); }
.alert-row.k-bot-anomaly { border-left-color: var(--violet); }
.alert-row.k-project-new { border-left-color: var(--cyan); }
.alert-row.k-branch-stale{ border-left-color: var(--ink-2); }

.alert-icon {
  width: 22px; height: 22px;
  display: grid; place-items: center;
  font-family: 'Audiowide', cursive;
  color: var(--cyan);
  font-size: 14px;
  flex-shrink: 0;
}
.alert-row.k-bot-crashed .alert-icon { color: var(--pink); }
.alert-row.k-bot-stuck   .alert-icon { color: var(--sun); }
.alert-row.k-bot-done    .alert-icon { color: var(--cyan); }
.alert-row.k-bot-anomaly .alert-icon { color: var(--violet); }
.alert-body { flex: 1; min-width: 0; }
.alert-title {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: var(--ink-0);
  letter-spacing: .02em;
}
.alert-msg {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--ink-1);
  margin-top: 2px;
}
.alert-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--ink-2);
  flex-shrink: 0;
}

/* ─── Status bar (footer) ──────────────────────────── */
.sbar {
  height: 26px;
  background: linear-gradient(90deg, rgba(255, 46, 147, .14), rgba(92, 255, 255, .08));
  border-top: 1px solid var(--line-2);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-1);
  flex-shrink: 0;
  position: relative; z-index: 3;
}
.sbar-l, .sbar-r { display: flex; align-items: center; gap: 18px; }
.sbar-item {
  display: flex; align-items: center; gap: 6px;
}
.sbar-item svg { width: 11px; height: 11px; opacity: .7; }
.sbar-item b {
  font-weight: 500;
  color: var(--ink-0);
  letter-spacing: .04em;
}
.sbar-item.live span::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--cyan);
  margin-right: 6px;
  vertical-align: 1px;
  box-shadow: 0 0 8px var(--cyan);
  animation: dot-pulse 2s ease-in-out infinite;
}
.sbar-item.live span {
  background: linear-gradient(90deg, var(--pink), var(--cyan));
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  font-weight: 600;
}

/* ─── Toast ────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 38px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  padding: 9px 18px;
  background: linear-gradient(180deg, rgba(40, 16, 72, .95), rgba(20, 8, 40, .95));
  border: 1px solid var(--cyan);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--cyan);
  text-shadow: 0 0 6px rgba(92, 255, 255, .55);
  box-shadow: 0 0 24px rgba(92, 255, 255, .25), 0 12px 32px rgba(0, 0, 0, .55);
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s, transform .25s;
  z-index: 1000;
}
.toast.on {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ─── Modal ────────────────────────────────────────── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(8, 4, 18, .65);
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
  z-index: 800;
}
.modal-bg.on { opacity: 1; pointer-events: auto; }
.modal {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(.96);
  width: 560px;
  max-width: 92vw;
  max-height: 86vh;
  background: linear-gradient(180deg, rgba(40, 16, 72, .98), rgba(20, 8, 40, .98));
  border: 1px solid var(--line-2);
  display: flex; flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s, transform .25s;
  box-shadow: 0 0 0 1px rgba(255, 46, 147, .2), 0 30px 80px rgba(0, 0, 0, .65);
  z-index: 900;
  overflow: hidden;
}
.modal::before {
  content: '';
  position: absolute; left: 0; right: 0; top: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--pink), var(--cyan));
  box-shadow: 0 0 14px rgba(255, 46, 147, .55);
}
.modal.on {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  pointer-events: auto;
}
.modal-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line-2);
}
.modal-hdr h3 {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink-0);
}
.modal-body {
  padding: 16px 18px;
  overflow-y: auto;
  flex: 1;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  color: var(--ink-1);
}

/* detail modal sections */
.dt-section {
  margin-bottom: 16px;
}
.dt-section h4 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--line-2);
}
.dt-stats {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
  gap: 6px;
}
.dt-stat {
  background: rgba(20, 8, 40, .55);
  border: 1px solid var(--line-2);
  padding: 8px 10px;
  min-width: 0;
  overflow: hidden;
}
.dt-stat-l {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink-2);
  margin-bottom: 4px;
}
.dt-stat-v {
  font-family: 'Audiowide', cursive;
  font-size: 16px;
  color: var(--ink-0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dt-stat-v.amber { color: var(--sun); }
.dt-stat-v.red   { color: var(--pink); }

.dt-scripts {
  display: flex; flex-direction: column;
  gap: 6px;
}
.dt-script-btn {
  background: rgba(20, 8, 40, .55);
  border: 1px solid var(--line-2);
  padding: 8px 12px;
  text-align: left;
  cursor: pointer;
  transition: all .18s;
  font-family: inherit;
}
.dt-script-btn:hover { border-color: var(--cyan); background: rgba(92, 255, 255, .06); }
.dt-script-name {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 12px;
  color: var(--cyan);
  letter-spacing: .04em;
}
.dt-script-cmd {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-2);
  margin-top: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.dt-commits, .dt-files {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  display: flex; flex-direction: column;
  gap: 4px;
}
.dt-commit {
  display: flex; gap: 10px; align-items: baseline;
  padding: 4px 0;
  border-bottom: 1px dashed var(--line-2);
  min-width: 0;
}
.dt-commit-hash { color: var(--cyan); flex-shrink: 0; min-width: 56px; }
.dt-commit-msg { flex: 1 1 0; min-width: 0; color: var(--ink-1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dt-commit-time { color: var(--ink-2); flex-shrink: 0; font-size: 9.5px; white-space: nowrap; }
.dt-file { color: var(--ink-1); padding: 2px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* detail header — description, stack, links */
.dt-head {
  padding: 10px 12px 12px;
  background: linear-gradient(135deg, rgba(255, 60, 160, .06), rgba(124, 70, 255, .06));
  border: 1px solid var(--line-2);
  border-left: 2px solid var(--cyan);
  margin-bottom: 14px;
}
.dt-desc {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  color: var(--ink-1);
  line-height: 1.4;
  margin-bottom: 8px;
}
.dt-meta-strip {
  display: flex; flex-wrap: wrap; gap: 6px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-2);
}
.dt-meta-strip b { color: var(--cyan); font-weight: 500; }
.dt-meta-strip a { color: var(--pink); text-decoration: none; }
.dt-meta-strip a:hover { text-decoration: underline; }

/* single-column stack — modal is narrow, two cols squeeze */
.dt-cols {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.dt-cols > div { min-width: 0; }

/* hot files — bar list */
.dt-hot {
  display: flex; flex-direction: column; gap: 4px;
}
.dt-hot-row {
  display: flex; align-items: center; gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  min-width: 0;
}
.dt-hot-path {
  flex: 1 1 0;
  min-width: 0;
  color: var(--ink-1);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.dt-hot-bar {
  height: 3px;
  background: linear-gradient(90deg, var(--cyan), var(--violet));
  border-radius: 1px;
  flex-shrink: 0;
  max-width: 80px;
}
.dt-hot-n {
  color: var(--ink-2);
  min-width: 22px;
  text-align: right;
  flex-shrink: 0;
}

/* authors */
.dt-author {
  display: flex; align-items: center; gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  padding: 4px 0;
}
.dt-author-dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 9px;
  font-weight: 700;
  color: #06030c;
  font-family: 'Rajdhani', sans-serif;
}
.dt-author-name { flex: 1; color: var(--ink-1); }
.dt-author-n {
  color: var(--cyan);
  font-size: 10px;
}

/* tags */
.dt-tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 8px;
  margin: 0 4px 4px 0;
  background: rgba(20, 8, 40, .55);
  border: 1px solid var(--line-2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--cyan);
}
.dt-tag-ts { color: var(--ink-2); font-size: 9px; }

/* lines diff bar */
.dt-diff {
  display: flex; align-items: center; gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  margin-top: 6px;
}
.dt-diff-add  { color: #00d97e; }
.dt-diff-del  { color: var(--pink); }
.dt-diff-bar {
  flex: 1;
  height: 4px;
  background: var(--line-2);
  border-radius: 2px;
  overflow: hidden;
  display: flex;
}
.dt-diff-bar > span { display: block; height: 100%; }
.dt-diff-bar .a { background: #00d97e; }
.dt-diff-bar .r { background: var(--pink); }

.dt-empty {
  color: var(--ink-2);
  font-size: 10.5px;
  font-family: 'JetBrains Mono', monospace;
  font-style: italic;
}
.empty {
  text-align: center;
  padding: 30px;
  color: var(--ink-2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.empty-spin {
  width: 18px; height: 18px;
  margin: 0 auto 10px;
  border: 2px solid var(--line-2);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* settings switch */
.set-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 0;
  border-bottom: 1px solid var(--line-2);
}
.set-row:last-child { border-bottom: 0; }
.set-name {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: var(--ink-0);
  letter-spacing: .04em;
}
.set-desc {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-2);
  margin-top: 2px;
}
.switch {
  width: 38px; height: 20px;
  background: rgba(20, 8, 40, .8);
  border: 1px solid var(--line-2);
  cursor: pointer;
  position: relative;
  transition: all .2s;
}
.switch::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 14px; height: 14px;
  background: var(--ink-2);
  transition: all .2s;
}
.switch.on {
  background: linear-gradient(90deg, var(--pink), var(--cyan));
  border-color: var(--pink);
  box-shadow: 0 0 12px rgba(255, 46, 147, .35);
}
.theme-select {
  background: rgba(20, 8, 40, .85);
  color: var(--ink-0);
  border: 1px solid var(--line-2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 6px 10px;
  cursor: pointer;
  min-width: 200px;
  outline: none;
  border-radius: 2px;
  transition: border-color .15s;
}
.theme-select:hover,
.theme-select:focus { border-color: var(--cyan); }
.theme-select option { background: #0a0418; color: #fff; }
body.is-light .theme-select { background: var(--bg-2); color: var(--tx-0); }
body.is-light .theme-select option { background: var(--bg-1); color: var(--tx-0); }

.switch.on::after {
  left: 20px;
  background: #1a0428;
}

/* ─── Command palette ──────────────────────────────── */
.cp-search-wrap {
  padding: 14px 18px;
  border-bottom: 1px solid var(--line-2);
}
.cp-search {
  width: 100%;
  border: 0; outline: 0;
  background: transparent;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--ink-0);
  caret-color: var(--pink);
}
.cp-search::placeholder { color: var(--ink-2); }
.cp-list {
  max-height: 60vh;
  overflow-y: auto;
  padding: 4px 0;
}
.cp-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 18px;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 13px;
  color: var(--ink-1);
  letter-spacing: .04em;
  transition: background .12s, color .12s;
}
.cp-item.sel {
  background: linear-gradient(90deg, rgba(255, 46, 147, .14), transparent);
  color: var(--cyan);
  border-left: 2px solid var(--cyan);
  padding-left: 16px;
}
.cp-icon {
  width: 16px; height: 16px;
  color: var(--ink-2);
  display: grid; place-items: center;
}
.cp-icon svg { width: 14px; height: 14px; }
.cp-item.sel .cp-icon { color: var(--cyan); }
.cp-name { flex: 1; }
.cp-hint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-3);
  letter-spacing: .12em;
  text-transform: uppercase;
}
.cp-empty {
  padding: 30px 18px;
  text-align: center;
  color: var(--ink-2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}

/* ─── Context menu ─────────────────────────────────── */
.ctx-menu {
  position: fixed;
  background: linear-gradient(180deg, rgba(40, 16, 72, .98), rgba(20, 8, 40, .98));
  border: 1px solid var(--line-2);
  min-width: 200px;
  padding: 4px 0;
  box-shadow: 0 0 0 1px rgba(255, 46, 147, .2), 0 18px 48px rgba(0, 0, 0, .65);
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s;
  z-index: 950;
}
.ctx-menu.on { opacity: 1; pointer-events: auto; }
.ctx-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 14px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 12px;
  color: var(--ink-1);
  cursor: pointer;
  letter-spacing: .04em;
  transition: background .12s, color .12s;
}
.ctx-item svg { width: 13px; height: 13px; color: var(--ink-2); flex-shrink: 0; }
.ctx-item:hover {
  background: rgba(92, 255, 255, .08);
  color: var(--cyan);
}
.ctx-item:hover svg { color: var(--cyan); }
.ctx-sep {
  height: 1px;
  background: var(--line-2);
  margin: 4px 0;
}

/* sample list */
.sample-list { display: flex; flex-direction: column; gap: 8px; }
.sample-item {
  background: rgba(20, 8, 40, .6);
  border: 1px solid var(--line-2);
  padding: 8px 12px;
}
.sample-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-2);
}
.sample-meta b { color: var(--cyan); font-weight: 500; }
.sample-data {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-1);
  background: rgba(8, 4, 18, .65);
  padding: 8px 10px;
  margin-top: 6px;
  white-space: pre-wrap;
  max-height: 200px;
  overflow-y: auto;
}

/* ─── Scrollbars ───────────────────────────────────── */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: rgba(20, 8, 40, .3); }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, rgba(255, 46, 147, .35), rgba(92, 255, 255, .25));
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--pink), var(--cyan));
}

::selection {
  background: var(--pink);
  color: #fff;
  text-shadow: none;
}

/* ─── Horizon strip (synthwave hero) ───────────────── */
.horizon-strip {
  position: relative;
  height: 70px;
  border-bottom: 1px solid var(--cyan);
  overflow: hidden;
  background: linear-gradient(180deg,
    transparent 0,
    rgba(160, 50, 255, .14) 40%,
    rgba(92, 255, 255, .04) 100%);
  box-shadow: 0 0 24px rgba(92, 255, 255, .18), inset 0 -1px 0 rgba(92, 255, 255, .55);
  flex-shrink: 0;
  z-index: 2;
}
.horizon-strip .sun {
  position: absolute;
  left: 50%; bottom: -76px;
  width: 150px; height: 150px;
  transform: translateX(-50%);
  background: linear-gradient(180deg, var(--sun) 0%, #ff5e8a 50%, var(--pink) 100%);
  border-radius: 50%;
  box-shadow: 0 0 60px rgba(255, 140, 66, .55), 0 0 120px rgba(255, 46, 147, .35);
}
.horizon-strip .sun::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  background: repeating-linear-gradient(0deg,
    transparent 0 12px,
    rgba(20, 8, 40, .85) 12px 16px,
    transparent 16px 28px,
    rgba(20, 8, 40, .7) 28px 31px);
}
.horizon-strip svg.grid {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  width: 100%;
  height: 50px;
}
.horizon-strip .kana {
  position: absolute;
  left: 18px; bottom: 6px;
  font-family: 'Major Mono Display', monospace;
  font-size: 10px;
  color: var(--cyan);
  letter-spacing: .3em;
  text-shadow: 0 0 8px rgba(92, 255, 255, .55);
  z-index: 3;
}
.horizon-strip .kana b {
  color: var(--pink);
  text-shadow: 0 0 8px rgba(255, 46, 147, .55);
}

/* hide horizon in light theme */
body.theme-light .horizon-strip { display: none; }
body.theme-light::before,
body.theme-light::after { display: none; }
body.theme-light {
  background: var(--bg-0);
  color: var(--tx-1);
}

/* light theme overrides — make readable */
body.theme-light .pcard { background: var(--bg-1); }
body.theme-light .pcard::before { background: linear-gradient(135deg, #ff2e93, #5a2f6a 50%, #5cffff); }
body.theme-light .pc-name { color: var(--tx-0); background: none; -webkit-text-fill-color: var(--tx-0); filter: none; }
body.theme-light .tb { background: var(--bg-1); }
body.theme-light .tabs { background: var(--bg-2); }
body.theme-light .toolbar { background: var(--bg-2); }
body.theme-light .main { background: transparent; }
body.theme-light .modal,
body.theme-light .ctx-menu { background: #fff; color: var(--tx-1); }

@media (max-width: 720px) {
  .tb-stats { display: none; }
  .toolbar { flex-wrap: wrap; }
}

/* ════════════════════════════════════════════════════
   ⚡ ANIMATED BACKGROUND — GPU-only smooth motion
   Strategy: only `transform` + `opacity` animate (cheap).
   No filter/box-shadow/background-position on large layers.
   ════════════════════════════════════════════════════ */

/* Sun radial — opacity-only pulse (cheap repaint) */
body.theme-dark::before {
  will-change: opacity, transform;
  animation: sun-pulse 14s ease-in-out infinite alternate;
}
@keyframes sun-pulse {
  0%   { opacity: .80; transform: translateX(-50%) scale(1); }
  100% { opacity: 1.0; transform: translateX(-50%) scale(1.04); }
}

/* Stars twinkle (single layer, opacity only) */
body.theme-dark::after {
  will-change: opacity;
  animation: stars-twinkle 7s ease-in-out infinite;
}
@keyframes stars-twinkle {
  0%, 100% { opacity: .28; }
  50%      { opacity: .15; }
}

/* Second star layer — drifts via transform */
body.theme-dark .root::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  opacity: .22;
  background-image:
    radial-gradient(.7px .7px at 14% 22%, #fff, transparent),
    radial-gradient(.7px .7px at 38% 36%, #fff, transparent),
    radial-gradient(.7px .7px at 55% 28%, #fff, transparent),
    radial-gradient(.7px .7px at 72% 44%, #fff, transparent),
    radial-gradient(.7px .7px at 18% 58%, #fff, transparent),
    radial-gradient(.7px .7px at 86% 62%, #fff, transparent),
    radial-gradient(.7px .7px at 48% 72%, #fff, transparent),
    radial-gradient(.7px .7px at 28% 84%, #fff, transparent);
  will-change: transform;
  animation: stars-drift 32s linear infinite;
  transform: translateZ(0);
}
@keyframes stars-drift {
  from { transform: translate3d(0, 0, 0); }
  to   { transform: translate3d(0, -40px, 0); }
}

/* Aurora band — slow horizontal drift via transform */
body.theme-dark .root::after {
  content: '';
  position: fixed;
  left: -20%; right: -20%;
  top: 30%;
  height: 280px;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(50% 100% at 30% 50%, rgba(160, 50, 255, .22), transparent 70%),
    radial-gradient(40% 100% at 75% 50%, rgba(255, 46, 147, .14), transparent 70%);
  will-change: transform, opacity;
  animation: aurora-drift 28s ease-in-out infinite alternate;
  transform: translateZ(0);
}
@keyframes aurora-drift {
  0%   { transform: translate3d(0, 0, 0); opacity: .55; }
  100% { transform: translate3d(60px, -10px, 0); opacity: .85; }
}

/* Horizon — grid rush toward viewer (transform on pseudo, GPU) */
.horizon-strip { overflow: hidden; }
.horizon-strip::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 100px;
  background:
    repeating-linear-gradient(0deg,
      rgba(92, 255, 255, .38) 0 1px,
      transparent 1px 16px);
  mask-image:        linear-gradient(0deg, rgba(0,0,0,.95) 0%, rgba(0,0,0,.7) 50%, transparent 100%);
  -webkit-mask-image: linear-gradient(0deg, rgba(0,0,0,.95) 0%, rgba(0,0,0,.7) 50%, transparent 100%);
  pointer-events: none;
  will-change: transform;
  animation: grid-rush 2.2s linear infinite;
  transform: translate3d(0, 0, 0);
}
@keyframes grid-rush {
  from { transform: translate3d(0, -16px, 0); }
  to   { transform: translate3d(0, 0, 0); }
}

/* Sun half-disc — opacity halo (no box-shadow animation) */
.horizon-strip .sun {
  will-change: opacity;
  animation: sun-halo 6s ease-in-out infinite alternate;
}
@keyframes sun-halo {
  0%   { opacity: .9; }
  100% { opacity: 1; }
}

/* Brand mark — single keyframe combining bob + soft glow pulse */
.brand-mark svg {
  will-change: transform;
  animation: brand-float 5s ease-in-out infinite;
}
@keyframes brand-float {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-2px); }
}

/* Live status dot — opacity pulse (no box-shadow per frame) */
.sbar-item.live span::before {
  will-change: opacity;
  animation: live-pulse 1.6s ease-in-out infinite;
}
@keyframes live-pulse {
  0%, 100% { opacity: 1; }
  50%      { opacity: .55; }
}

/* Respect reduced-motion */
@media (prefers-reduced-motion: reduce) {
  body.theme-dark::before,
  body.theme-dark::after,
  body.theme-dark .root::before,
  body.theme-dark .root::after,
  .horizon-strip::after,
  .horizon-strip .sun,
  .brand-mark svg,
  .sbar-item.live span::before {
    animation: none !important;
  }
}

/* ════════════════════════════════════════════════════
   🐳 INFRA TAB — container cards + bars + runtime pills
   ════════════════════════════════════════════════════ */
.infra-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
  padding: 0 4px;
}
.infra-stats {
  display: flex; gap: 18px;
  font-family: 'JetBrains Mono', monospace;
}
.infra-stat {
  display: flex; align-items: baseline; gap: 6px;
  font-size: 10px;
  color: var(--ink-2);
  letter-spacing: .14em;
  text-transform: uppercase;
}
.infra-stat b {
  font-family: 'Audiowide', cursive;
  font-size: 22px;
  font-weight: 400;
  background: linear-gradient(135deg, var(--cyan), var(--pink));
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  filter: drop-shadow(0 0 6px rgba(92, 255, 255, .35));
}
.infra-stat i { font-style: normal; color: var(--ink-1); }
.infra-rt-pills {
  display: flex; gap: 6px;
}
.rt-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: .14em;
  text-transform: uppercase;
  border: 1px solid var(--line-2);
  background: rgba(20, 8, 40, .5);
  color: var(--ink-1);
}
.rt-pill .d {
  width: 6px; height: 6px;
  background: var(--cyan);
  box-shadow: 0 0 6px var(--cyan);
  flex-shrink: 0;
}
.rt-pill.on { border-color: var(--cyan); color: var(--cyan); }
.rt-pill.down { color: var(--ink-3); border-color: var(--line-2); }
.rt-pill.down .d { background: var(--ink-3); box-shadow: none; }

/* container cards inherit .pcard look but add their own colored accents */
.infra-card .pc-top {
  align-items: center;
}
.infra-card .badge.rt {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  flex-shrink: 0;
}
.infra-card .badge.rt-docker { color: var(--cyan); border-color: var(--cyan); background: rgba(92, 255, 255, .08); }
.infra-card .badge.rt-podman { color: var(--violet); border-color: var(--violet-line); background: var(--violet-soft); }
.infra-card .badge.rt-wsl    { color: var(--sun);    border-color: var(--sun);    background: rgba(255, 140, 66, .08); }

/* kind/state badges */
.infra-card .badge.kind-db      { color: var(--cyan); border-color: var(--cyan); background: rgba(92, 255, 255, .1); }
.infra-card .badge.kind-proxy   { color: var(--violet); border-color: var(--violet-line); background: var(--violet-soft); }
.infra-card .badge.kind-observ  { color: var(--sun); border-color: var(--sun); background: rgba(255, 140, 66, .1); }
.infra-card .badge.kind-queue   { color: var(--pink); border-color: var(--pink); background: rgba(255, 46, 147, .1); }
.infra-card .badge.kind-storage { color: var(--ink-1); border-color: var(--line-2); }
.infra-card .badge.kind-app     { color: var(--ink-1); border-color: var(--line-2); }
.infra-card .badge.ports        { color: var(--cyan); border-color: var(--cyan-line); background: rgba(92, 255, 255, .06); font-family: 'JetBrains Mono', monospace; }
.infra-card .badge.state-running { color: var(--cyan); border-color: var(--cyan); }
.infra-card .badge.state-paused  { color: var(--sun); border-color: var(--sun); }
.infra-card .badge.state-exited  { color: var(--pink); border-color: var(--pink); }
.infra-card .badge.state-dead    { color: var(--pink); border-color: var(--pink); }
.infra-card .badge.state-created { color: var(--ink-2); border-color: var(--line-2); }
.infra-card .badge.state-restarting { color: var(--sun); border-color: var(--sun); }

/* bars (CPU/RAM) */
.infra-bars {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 8px 14px 10px;
  border-top: 1px dashed rgba(160, 50, 255, .25);
}
.infra-bars .bar {
  display: flex; flex-direction: column; gap: 4px;
}
.infra-bars .bar-head {
  display: flex; justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--ink-2);
}
.infra-bars .bar-v {
  color: var(--cyan);
  font-weight: 500;
  letter-spacing: .04em;
  text-transform: none;
}
.infra-bars .bar-track {
  height: 4px;
  background: rgba(255, 255, 255, .04);
  overflow: hidden;
}
.infra-bars .bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--violet));
  transition: width .5s ease, background .3s;
}
.infra-bars .bar-fill.warm { background: linear-gradient(90deg, var(--sun), var(--pink)); }
.infra-bars .bar-fill.hot  { background: linear-gradient(90deg, var(--pink), var(--red)); }

.infra-card.running .pc-stat-dot.active {
  /* pulsing cyan dot inherits from existing .pc-stat-dot.active */
}
.infra-card.k-db .pc-name { background: linear-gradient(90deg, var(--ink-0), var(--cyan)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.infra-card.k-proxy .pc-name { background: linear-gradient(90deg, var(--ink-0), var(--violet)); -webkit-background-clip: text; background-clip: text; color: transparent; }

/* ════════════════════════════════════════════════════
   📐 RESPONSIVE — full coverage 320 → ∞
   Window resizable from 420×480 (Electron). Web preview wider.
   Breakpoints: 1100 / 880 / 720 / 560 / 420.
   ════════════════════════════════════════════════════ */

/* Generic safety: prevent any element forcing horizontal overflow */
body, .root, .main { max-width: 100vw; }

/* Grid always uses min() trick so 1 col never overflows narrow viewport */
.grid {
  grid-template-columns: repeat(auto-fill, minmax(min(360px, 100%), 1fr));
  gap: 12px;
}

/* ≥ 1100px: comfortable 2-col, generous padding */
@media (min-width: 1100px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 14px; }
  .main { padding: 20px; }
}

/* ≤ 880px — compact titlebar (no stat-mini chips) */
@media (max-width: 880px) {
  .tb-stats { display: none; }
  .tb { padding: 0 10px 0 12px; }
  .brand { gap: 9px; }
  .brand-mark { width: 22px; height: 22px; }
  .brand-name { font-size: 13px; letter-spacing: .14em; }
  .brand-sub { font-size: 8.5px; }
  .icon-btn { width: 26px; height: 26px; }
  .icon-btn svg { width: 12px; height: 12px; }

  .horizon-strip { height: 56px; }

  function fmtNum(n) {
    if (n === null || n === undefined) return '—'
    if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M'
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k'
    return String(n)
  }
  function fmtETA(ms) {
    if (ms === null || ms === undefined || !isFinite(ms) || ms < 0) return '—'
    const m = Math.floor(ms / 60000)
    if (m < 1) return '<1m'
    if (m < 60) return m + 'm'
    const h = Math.floor(m / 60)
    if (h < 24) return h + 'h ' + (m % 60) + 'm'
    return Math.floor(h / 24) + 'd ' + (h % 24) + 'h'
  }
  function relTime(ms) {
    if (!ms) return '—'
    const diff = Date.now() - ms
    const m = Math.floor(diff / 60000)
    if (m < 1)  return 'ahora'
    if (m < 60) return 'hace ' + m + 'm'
    const h = Math.floor(m / 60)
    if (h < 24) return 'hace ' + h + 'h'
    const d = Math.floor(h / 24)
    if (d < 30) return 'hace ' + d + 'd'
    return 'hace ' + Math.floor(d / 30) + 'mes'
  }
  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c])

  /* ═════════ Toast ═════════ */
  let toastTimer = null
  function toast(msg) {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.classList.add('on')
    if (toastTimer) clearTimeout(toastTimer)
    toastTimer = setTimeout(() => t.classList.remove('on'), 1800)
  }

  /* ═════════ Modal ═════════ */
  function openModal(title, html) {
    document.getElementById('modal-title').textContent = title
    document.getElementById('modal-body').innerHTML = html
    document.getElementById('modal-bg').classList.add('on')
    document.getElementById('modal').classList.add('on')
  }
  function closeModal() {
    document.getElementById('modal-bg').classList.remove('on')
    document.getElementById('modal').classList.remove('on')
    document.getElementById('palette').classList.remove('on')
  }
  document.getElementById('modal-close').addEventListener('click', closeModal)
  document.getElementById('modal-bg').addEventListener('click', closeModal)

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {

      t.classList.add('on')

    render()

  /* ═════════ Keyboard shortcuts ═════════ */
  document.addEventListener('keydown', (e) => {
    /* Cmd/Ctrl + R — refresh */
    if ((e.ctrlKey || e.metaKey) && e.key === 'r') {
      e.preventDefault()
      window.asura.requestProjects()
      window.asura.requestBots()
      toast('actualizando...')
      return
    }
    /* / focus search */
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault()
      document.getElementById('search').focus()
      return
    }
    /* Esc */
    if (e.key === 'Escape') {
      const isModalOpen = document.getElementById('modal').classList.contains('on') ||
                          document.getElementById('palette').classList.contains('on')
      if (isModalOpen) { closeModal(); return }
      const ctx = document.getElementById('ctx-menu')
      if (ctx.classList.contains('on')) { ctx.classList.remove('on'); return }
      const s = document.getElementById('search')
      if (s.value) { s.value = ''; searchQuery = ''; render() }
      s.blur()
    }
  })

  async function doAction(kind, name, extra) {

    const labels = {
      'open-vscode':   'editor abierto',
      'open-cursor':   'cursor abierto',

  /* ═════════ Themes ═════════ */
  const THEMES = [
    { id: 'synthwave',  label: 'Outrun synthwave',    light: false },
    { id: 'brutalist',  label: 'Brutalist editorial', light: true  },
    { id: 'blueprint',  label: 'Cyberdeck blueprint', light: false },
    { id: 'solarpunk',  label: 'Solarpunk pixel',     light: true  },
    { id: 'vaporwave',  label: 'Vaporwave clínico',   light: true  },
    { id: 'risograph',  label: 'Risograph field',     light: true  },
    { id: 'cyberpunk',  label: 'Cyberpunk neon',      light: false },
    { id: 'sumie',      label: 'Hanami sumi-e',       light: true  },
    { id: 'manga',      label: 'Manga halftone',      light: true  },
    { id: 'rain',       label: 'Petrichor rain',      light: false },
    { id: 'akira',      label: 'Neo-Tokyo akira',     light: false },
    { id: 'ghost',      label: 'Netwatch ghost',      light: false },
  ]
  function normalizeTheme(t) {
    if (!t) return 'synthwave'
    if (t === 'dark') return 'synthwave'
    if (t === 'light') return 'vaporwave'
    return THEMES.some(x => x.id === t) ? t : 'synthwave'
  }
  function applyTheme(id) {
    const tid = normalizeTheme(id)
    const meta = THEMES.find(x => x.id === tid)
    /* clear all theme-* classes */
    for (const c of Array.from(document.body.classList)) {
      if (c.startsWith('theme-') || c === 'is-light') document.body.classList.remove(c)
    }
    document.body.classList.add('theme-' + tid)
    /* synthwave keeps the legacy dark gradient + sun glow */
    if (tid === 'synthwave') document.body.classList.add('theme-dark')
    if (meta && meta.light) document.body.classList.add('is-light')
  }
  async function setTheme(id) {
    const tid = normalizeTheme(id)
    applyTheme(tid)
    try { localStorage.setItem('asura:theme', tid) } catch {}
    const prev = config && config.theme
    if (config) config.theme = tid
    try {
      await window.asura.setConfig({ theme: tid })
      toast('tema: ' + THEMES.find(x => x.id === tid).label)
    } catch (e) {
      if (config) config.theme = prev
      toast('error guardando tema')
    }
  }

  /* ═════════ Command palette ═════════ */
  function openPalette() {
    const palette = document.getElementById('palette')
    palette.classList.add('on')
    document.getElementById('modal-bg').classList.add('on')
    selectedCpIndex = 0
    rebuildCpItems('')
    setTimeout(() => document.getElementById('cp-input').focus(), 50)
  }
  document.getElementById('cp-input').addEventListener('input', (e) => {
    selectedCpIndex = 0
    rebuildCpItems(e.target.value.toLowerCase().trim())
  })
  document.getElementById('cp-input').addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown') { e.preventDefault(); selectedCpIndex = Math.min(cpItems.length - 1, selectedCpIndex + 1); renderCpList() }
    else if (e.key === 'ArrowUp') { e.preventDefault(); selectedCpIndex = Math.max(0, selectedCpIndex - 1); renderCpList() }
    else if (e.key === 'Enter')   { e.preventDefault(); if (cpItems[selectedCpIndex]) { cpItems[selectedCpIndex].run(); closeModal() } }
  })

  function rebuildCpItems(q) {
    cpItems = []
    /* projects */
    for (const p of projects) {
      const txt = (p.name + ' ' + p.stack.join(' ') + ' ' + (p.git.branch || '')).toLowerCase()
      if (!q || txt.includes(q)) {
        cpItems.push({
          icon: '📁', label: p.name, hint: 'abrir',
          run: () => openDetailModal(p.name),
        })
      }
    }
    /* commands */
    const cmds = [
      { label: 'Refrescar workspace',     hint: 'ctrl+r', run: () => { window.asura.requestProjects(); window.asura.requestBots(); toast('actualizando...') } },
      { label: 'Toggle always on top',    hint: 'aot',    run: () => toggleAlwaysOnTop() },
      { label: 'Abrir ajustes',           hint: '',       run: () => openSettings() },
      { label: 'Limpiar alertas',         hint: '',       run: async () => { await window.asura.clearAlerts(); toast('alertas limpiadas') } },
      { label: 'Siguiente tema visual', hint: '',         run: () => { const idx = THEMES.findIndex(t => t.id === normalizeTheme(config.theme)); setTheme(THEMES[(idx + 1) % THEMES.length].id) } },
      ...THEMES.map(t => ({ label: 'Tema · ' + t.label, hint: t.id, run: () => setTheme(t.id) })),
      { label: 'Minimizar a tray',        hint: '',       run: () => window.asura.hide() },
    ]
    for (const c of cmds) {
      if (!q || c.label.toLowerCase().includes(q)) cpItems.push({ icon: '⚡', ...c })
    }
    renderCpList()
  }
  function renderCpList() {
    const list = document.getElementById('cp-list')
    if (!cpItems.length) {
      list.innerHTML = '<div class="cp-empty">Sin resultados</div>'
      return
    }
    list.innerHTML = cpItems.map((item, i) => (
      '<div class="cp-item ' + (i === selectedCpIndex ? 'sel' : '') + '" data-i="' + i + '">' +
        '<div class="cp-icon">' + (item.icon === '📁' ? ICO.folder : (item.icon === '⚡' ? ICO.play : '')) + '</div>' +
        '<div class="cp-name">' + escapeHtml(item.label) + '</div>' +
        (item.hint ? '<div class="cp-hint">' + escapeHtml(item.hint) + '</div>' : '') +
      '</div>'
    )).join('')
    list.querySelectorAll('.cp-item').forEach(el => {
      el.addEventListener('click', () => {
        const i = parseInt(el.dataset.i, 10)
        if (cpItems[i]) { cpItems[i].run(); closeModal() }
      })
    })
  }

  /* ═════════ Drill-in detail modal ═════════ */
  function authorColor(name) {
    let h = 0
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0
    const palette = ['#5cffff', '#ff3ca0', '#ffb15a', '#9d6cff', '#00d97e', '#f9a825']
    return palette[h % palette.length]
  }
  function initials(name) {
    return name.split(/[\s.@-]+/).filter(Boolean).slice(0, 2).map(p => p[0]).join('').toUpperCase() || '?'
  }
  function shortPath(p, max) {
    max = max || 38
    if (p.length <= max) return p
    const parts = p.split('/')
    if (parts.length <= 2) return '…' + p.slice(-(max - 1))
    let tail = parts[parts.length - 1]
    let i = parts.length - 2
    while (i > 0 && (tail.length + parts[i].length + 4) <= max) {
      tail = parts[i] + '/' + tail
      i--
    }
    return '…/' + tail
  }
  function fmtDateAbs(ms) {
    if (!ms) return ''
    const d = new Date(ms)
    return d.toISOString().slice(0, 10)
  }

  async function openDetailModal(name) {
    const proj = projects.find(p => p.name === name)
    if (!proj) return
    openModal(name, '<div class="empty"><div class="empty-spin"></div>cargando detalles...</div>')
    const detail = await window.asura.getDetail(name)
    if (!detail) { document.getElementById('modal-body').innerHTML = '<div class="empty">No detalles disponibles</div>'; return }

    /* ── HEAD: description + meta strip ── */
    const metaBits = []
    if (proj.git.branch)        metaBits.push('<span><b>' + escapeHtml(proj.git.branch) + '</b></span>')
    if (detail.packageVersion)  metaBits.push('<span>v<b>' + escapeHtml(detail.packageVersion) + '</b></span>')
    if (detail.license)         metaBits.push('<span>' + escapeHtml(detail.license) + '</span>')
    if (detail.repoSizeMb !== null) metaBits.push('<span><b>' + detail.repoSizeMb + '</b> MB</span>')
    if (detail.branches > 1)    metaBits.push('<span><b>' + detail.branches + '</b> ramas</span>')
    if (proj.prodUrl)           metaBits.push('<span><a href="' + escapeAttr(proj.prodUrl) + '" onclick="event.preventDefault();window.asura.action(\'open-dev-url\',\'' + escapeAttr(name) + '\',\'' + escapeAttr(proj.prodUrl) + '\')">↗ producción</a></span>')
    if (detail.remoteUrl)       metaBits.push('<span><a href="' + escapeAttr(detail.remoteUrl) + '" onclick="event.preventDefault();window.asura.action(\'open-dev-url\',\'' + escapeAttr(name) + '\',\'' + escapeAttr(detail.remoteUrl) + '\')">↗ repo</a></span>')

    const headHtml =
      '<div class="dt-head">' +
        (detail.description ? '<div class="dt-desc">' + escapeHtml(detail.description) + '</div>' : '') +
        (metaBits.length ? '<div class="dt-meta-strip">' + metaBits.join('') + '</div>' : '') +
      '</div>'

    /* ── STATS ── */
    const totalCommits14 = detail.commitsByDay.reduce((a,b)=>a+b,0)
    const stats = []
    stats.push('<div class="dt-stat"><div class="dt-stat-l">commits 14d</div><div class="dt-stat-v">' + totalCommits14 + '</div></div>')
    if (detail.branchAge !== null) {
      stats.push('<div class="dt-stat"><div class="dt-stat-l">edad repo</div><div class="dt-stat-v">' + detail.branchAge + 'd</div></div>')
    }
    stats.push('<div class="dt-stat"><div class="dt-stat-l">todos/fixme</div><div class="dt-stat-v ' + (detail.todoCount > 50 ? 'amber' : '') + '">' + detail.todoCount + '</div></div>')
    if (detail.envMissing.length) {
      stats.push('<div class="dt-stat"><div class="dt-stat-l">env faltantes</div><div class="dt-stat-v red">' + detail.envMissing.length + '</div></div>')
    }
    if (proj.git.dirtyCount > 0) {
      stats.push('<div class="dt-stat"><div class="dt-stat-l">sin commit</div><div class="dt-stat-v amber">' + proj.git.dirtyCount + '</div></div>')
    }
    if (detail.lastBuildAt) {
      stats.push('<div class="dt-stat"><div class="dt-stat-l">build ' + escapeHtml(detail.buildArtifact || '') + '</div><div class="dt-stat-v" style="font-size:11px">' + relTime(detail.lastBuildAt) + '</div></div>')
    }

    /* ── DIFF BAR ── */
    let diffHtml = ''
    if (detail.linesAdded30d > 0 || detail.linesRemoved30d > 0) {
      const tot = detail.linesAdded30d + detail.linesRemoved30d
      const aPct = (detail.linesAdded30d / tot) * 100
      const rPct = 100 - aPct
      diffHtml =
        '<div class="dt-diff">' +
          '<span class="dt-diff-add">+' + detail.linesAdded30d.toLocaleString() + '</span>' +
          '<div class="dt-diff-bar"><span class="a" style="width:' + aPct + '%"></span><span class="r" style="width:' + rPct + '%"></span></div>' +
          '<span class="dt-diff-del">−' + detail.linesRemoved30d.toLocaleString() + '</span>' +
        '</div>'
    }

    /* ── HOT FILES ── */
    const maxHot = Math.max(1, ...detail.hotFiles.map(f => f.changes))
    const hotHtml = detail.hotFiles.length
      ? '<div class="dt-hot">' + detail.hotFiles.map(f =>
          '<div class="dt-hot-row" title="' + escapeAttr(f.path) + '">' +
            '<span class="dt-hot-path">' + escapeHtml(shortPath(f.path, 38)) + '</span>' +
            '<span class="dt-hot-bar" style="width:' + (8 + (f.changes / maxHot) * 60) + 'px"></span>' +
            '<span class="dt-hot-n">' + f.changes + '</span>' +
          '</div>').join('') + '</div>'
      : '<div class="dt-empty">Sin cambios últimos 30d</div>'

    /* ── AUTHORS ── */
    const authorsHtml = detail.topAuthors.length
      ? detail.topAuthors.map(a =>
          '<div class="dt-author">' +
            '<span class="dt-author-dot" style="background:' + authorColor(a.name) + '">' + escapeHtml(initials(a.name)) + '</span>' +
            '<span class="dt-author-name">' + escapeHtml(a.name) + '</span>' +
            '<span class="dt-author-n">' + a.commits + '</span>' +
          '</div>').join('')
      : '<div class="dt-empty">Sin commits últimos 90d</div>'

    /* ── TAGS ── */
    const tagsHtml = detail.tags.length
      ? '<div>' + detail.tags.map(t =>
          '<span class="dt-tag">' + escapeHtml(t.name) + (t.ts ? '<span class="dt-tag-ts">' + fmtDateAbs(t.ts) + '</span>' : '') + '</span>').join('') + '</div>'
      : '<div class="dt-empty">Sin tags</div>'

    /* ── SCRIPTS ── */
    const scriptsHtml = detail.scripts.length
      ? '<div class="dt-scripts">' + detail.scripts.map(s =>
          '<button class="dt-script-btn" onclick="doAction(\'run-script\',\'' + escapeAttr(name) + '\',\'' + escapeAttr(s.name) + '\')">' +
            '<div class="dt-script-name">▶ ' + escapeHtml(s.name) + '</div>' +
            '<div class="dt-script-cmd">' + escapeHtml(s.cmd) + '</div>' +
          '</button>').join('') + '</div>'
      : '<div class="dt-empty">Sin scripts en package.json</div>'

    /* ── COMMITS ── */
    const commitsHtml = detail.recentCommits.length
      ? '<div class="dt-commits">' + detail.recentCommits.map(c =>
