/* 12 SYNTHWAVE — outrun sunset (default — same as :root) */
body.theme-synthwave { /* matches :root */ }

/* light themes share — disable synthwave glow + horizon strip */
body.is-light::before,
body.is-light::after { display: none !important; }
body.is-light {
  background:
    radial-gradient(ellipse 90% 60% at 50% 0%, var(--bg-2) 0%, var(--bg-0) 60%) fixed,
    var(--bg-0) !important;
}
body.is-light .horizon-strip { display: none; }
/* hide synthwave horizon + sun glow on any non-synthwave theme */
body:not(.theme-synthwave) .horizon-strip { display: none; }
body:not(.theme-synthwave)::before,
body:not(.theme-synthwave)::after { display: none !important; }
body:not(.theme-synthwave):not(.is-light) {
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, var(--bg-2) 0%, var(--bg-0) 60%) fixed,
    var(--bg-0) !important;
}
body.is-light .pcard {
  background: var(--bg-card) !important;
  border: 1px solid var(--line-2);
}
body.is-light .pcard::before { display: none; }
body.is-light .pc-name {
  background: none !important;
  -webkit-text-fill-color: var(--tx-0) !important;
  color: var(--tx-0) !important;
  filter: none !important;
}
body.is-light .modal,
body.is-light .ctx-menu,
body.is-light .cp { background: var(--bg-1) !important; color: var(--tx-1); }
body.is-light .modal { border: 1px solid var(--line-2); }
body.is-light .tb,
body.is-light .toolbar,
body.is-light .tabs { background: var(--bg-2); border-color: var(--line-2); }
body.is-light .main { background: transparent; }
body.is-light .pc-stack,
body.is-light .pc-tags { background: transparent; }
body.is-light .badge { background: var(--bg-2); color: var(--tx-1); border-color: var(--line-2); }
body.is-light .chip { background: var(--bg-2); color: var(--tx-0); border-color: var(--line-2); }

/* ═════════ chrome overrides — light themes use light surfaces ═════════ */
body.is-light .tb {
  background: var(--bg-1) !important;
  color: var(--tx-0);
  border-bottom: 1px solid var(--line-2);
}
body.is-light .tb-stats { background: var(--bg-2); color: var(--tx-1); border-color: var(--line-2); }
body.is-light .tabs {
  background: var(--bg-2) !important;
  border-bottom: 1px solid var(--line-2);
  color: var(--tx-1);
}
body.is-light .tab { color: var(--tx-1); }
body.is-light .tab.active { color: var(--tx-0); }
body.is-light .toolbar {
  background: var(--bg-1) !important;
  border-bottom: 1px solid var(--line-2);
}
body.is-light .search-wrap {
  background: var(--bg-1) !important;
  border-color: var(--line-2);
}
body.is-light .search { color: var(--tx-0); caret-color: var(--pink); }
body.is-light .search::placeholder { color: var(--tx-2); }
body.is-light .kbd {
  background: var(--bg-2) !important;
  color: var(--tx-1);
  border-color: var(--line-2);
}
body.is-light .filter {
  background: var(--bg-2) !important;
  color: var(--tx-1);
  border-color: var(--line-2);
}
body.is-light .filter.active {
  background: var(--pink) !important;
  color: var(--bg-1);
  border-color: var(--pink);
}
body.is-light .pc-actions {
  background: var(--bg-2) !important;
  border-top: 1px solid var(--line-2);
}
body.is-light .ab {
  color: var(--tx-1);
  border-right: 1px solid var(--line-2);
}
body.is-light .ab:hover {
  background: var(--bg-3);
  color: var(--tx-0);
}
body.is-light .ab.primary { color: var(--pink); text-shadow: none; }
body.is-light .ab.primary:hover { background: var(--pink); color: var(--bg-1); }
body.is-light .sbar {
  background: var(--bg-2) !important;
  color: var(--tx-1);
  border-top: 1px solid var(--line-2);
}
body.is-light .sbar-item b { color: var(--tx-0); }
body.is-light .sbar-item.live span {
  background: none !important;
  color: var(--tx-0) !important;
  -webkit-text-fill-color: var(--tx-0) !important;
}
body.is-light .sbar-item.live span::before { background: var(--pink); box-shadow: 0 0 6px var(--pink); }
body.is-light .toast {
  background: var(--bg-1) !important;
  color: var(--tx-0);
  border-color: var(--line-2);
}
body.is-light .pc-meta-icon { color: var(--ink-1); }
body.is-light .pc-meta-v b { color: var(--ink-0); }
body.is-light .pc-meta-time { color: var(--tx-2); }
body.is-light .pcard-fav-star { color: var(--tx-2); }
body.is-light .pcard.fav .pcard-fav-star { color: var(--sun); }
body.is-light .pc-stat-dot { box-shadow: 0 0 0 2px var(--bg-1); }
body.is-light .pc-stat-dot.active { box-shadow: 0 0 8px var(--cyan-line), 0 0 0 2px var(--bg-1); }
body.is-light .pc-spark-bar { background: var(--bg-3); }
body.is-light .icon-btn { color: var(--tx-1); }
body.is-light .icon-btn:hover { color: var(--tx-0); background: var(--bg-3); }
body.is-light .placeholder { color: var(--tx-2); }
body.is-light .placeholder code { background: var(--bg-3); color: var(--tx-0); }
body.is-light .ctx-menu {
  background: var(--bg-1) !important;
  color: var(--tx-0);
  border: 1px solid var(--line-2);
}
body.is-light .ctx-item { color: var(--tx-1); }
body.is-light .ctx-item:hover { background: var(--bg-2); color: var(--tx-0); }
body.is-light .cp-input { background: var(--bg-2) !important; color: var(--tx-0); border-color: var(--line-2); }
body.is-light .cp-input::placeholder { color: var(--tx-2); }
body.is-light .cp-item { color: var(--tx-1); }
body.is-light .cp-item.sel { background: var(--bg-3); color: var(--tx-0); }

/* dt-* (detalle modal) */
body.is-light .dt-section h4 { color: var(--ink-0); border-bottom-color: var(--line-2); }
body.is-light .dt-stat { background: var(--bg-2); border-color: var(--line-2); }
body.is-light .dt-stat-l { color: var(--tx-2); }
body.is-light .dt-stat-v { color: var(--tx-0); }
body.is-light .dt-script-btn { background: var(--bg-2); border-color: var(--line-2); color: var(--tx-0); }
body.is-light .dt-script-btn:hover { background: var(--bg-3); }
body.is-light .dt-commit { border-bottom-color: var(--line-2); }
body.is-light .dt-commit-msg { color: var(--tx-0); }
body.is-light .dt-commit-time { color: var(--tx-2); }
body.is-light .dt-file { color: var(--tx-0); }
body.is-light .dt-head { background: var(--bg-2); border-color: var(--line-2); }
body.is-light .dt-desc { color: var(--tx-0); }
body.is-light .dt-meta-strip { color: var(--tx-1); }
body.is-light .dt-author-name { color: var(--tx-0); }
body.is-light .dt-tag { background: var(--bg-2); border-color: var(--line-2); color: var(--ink-0); }
body.is-light .dt-empty { color: var(--tx-2); }

/* settings */
body.is-light .set-row { border-bottom-color: var(--line-2); }
body.is-light .set-name { color: var(--tx-0); }
body.is-light .set-desc { color: var(--tx-2); }
body.is-light .switch { background: var(--bg-3); border-color: var(--line-2); }
body.is-light .switch.on { background: var(--pink); border-color: var(--pink); }

/* dark-but-not-synthwave themes — repaint chrome from theme vars */
body:not(.theme-synthwave):not(.is-light) .tb,
body:not(.theme-synthwave):not(.is-light) .toolbar { background: var(--bg-1) !important; border-color: var(--line-2); }
body:not(.theme-synthwave):not(.is-light) .tabs { background: var(--bg-2) !important; }
body:not(.theme-synthwave):not(.is-light) .search-wrap,
body:not(.theme-synthwave):not(.is-light) .filter,
body:not(.theme-synthwave):not(.is-light) .kbd,
body:not(.theme-synthwave):not(.is-light) .tb-stats { background: var(--bg-2) !important; border-color: var(--line-2); }
body:not(.theme-synthwave):not(.is-light) .pc-actions { background: var(--bg-2) !important; }
body:not(.theme-synthwave):not(.is-light) .sbar { background: linear-gradient(90deg, var(--green-soft), var(--cyan-soft)) !important; border-color: var(--line-2); }
body:not(.theme-synthwave):not(.is-light) .toast { background: var(--bg-2) !important; border-color: var(--cyan); }
body:not(.theme-synthwave):not(.is-light) .ctx-menu { background: var(--bg-1) !important; border-color: var(--line-2); }
body:not(.theme-synthwave):not(.is-light) .cp-input { background: var(--bg-2) !important; border-color: var(--line-2); }
body:not(.theme-synthwave):not(.is-light) .cp-item.sel { background: var(--bg-3); }
body:not(.theme-synthwave):not(.is-light) .dt-stat,
body:not(.theme-synthwave):not(.is-light) .dt-script-btn,
body:not(.theme-synthwave):not(.is-light) .dt-tag,
body:not(.theme-synthwave):not(.is-light) .dt-head { background: var(--bg-2) !important; border-color: var(--line-2); }

/* ═════════ PER-THEME PERSONALITY ═════════ */

/* 01 BRUTALIST — flat, harsh borders, no gradients, no rounding */
body.theme-brutalist .pcard {
  border: 2px solid var(--ink-0);
  border-radius: 0;
  background: var(--bg-1);
  box-shadow: 6px 6px 0 var(--ink-0);
  transition: transform .12s, box-shadow .12s;
}
body.theme-brutalist .pcard:hover { transform: translate(-2px,-2px); box-shadow: 9px 9px 0 var(--ink-0); }
body.theme-brutalist .pcard::before { display: none; }
body.theme-brutalist .pcard::after { width: 6px; box-shadow: none; border-radius: 0; }
body.theme-brutalist .pc-name {
  text-transform: uppercase;
  letter-spacing: .04em;
  font-weight: 800;
}
body.theme-brutalist .badge,
body.theme-brutalist .chip {
  border-radius: 0;
  border-width: 1.5px;
  text-transform: uppercase;
  font-weight: 700;
}
body.theme-brutalist .modal { border: 2px solid var(--ink-0); border-radius: 0; box-shadow: 8px 8px 0 var(--ink-0); }
body.theme-brutalist .ab { border-right: 1.5px solid var(--ink-0); }

/* 02 BLUEPRINT — drafting paper, dotted grid bg, technical */
body.theme-blueprint {
  background:
    repeating-linear-gradient(0deg,  transparent 0 23px, rgba(92,242,255,.04) 23px 24px),
    repeating-linear-gradient(90deg, transparent 0 23px, rgba(92,242,255,.04) 23px 24px),
    var(--bg-0) !important;
}
body.theme-blueprint .pcard {
  border: 1px dashed var(--accent, var(--cyan));
  background: rgba(15,31,49,.7);
  backdrop-filter: blur(2px);
}
body.theme-blueprint .pcard::before { background: linear-gradient(135deg, var(--cyan), var(--violet) 50%, var(--cyan)); opacity: .4; }
body.theme-blueprint .pc-name { font-family: 'JetBrains Mono', monospace; font-size: 17px; letter-spacing: .02em; }

/* 03 SOLARPUNK — organic, rounded, paper grain */
body.theme-solarpunk {
  background:
    radial-gradient(circle at 30% 20%, rgba(216,162,59,.06), transparent 50%),
    radial-gradient(circle at 70% 80%, rgba(90,138,58,.06), transparent 50%),
    var(--bg-0) !important;
}
body.theme-solarpunk .pcard {
  border-radius: 14px;
  border: 1px solid var(--line-2);
  box-shadow: 0 2px 0 var(--line-2);
}
body.theme-solarpunk .pcard::before { display: none; }
body.theme-solarpunk .pcard::after { border-radius: 14px 0 0 14px; }
body.theme-solarpunk .pc-name { font-family: 'Instrument Serif', 'Rajdhani', serif; font-style: italic; font-weight: 500; font-size: 22px; }
body.theme-solarpunk .badge,
body.theme-solarpunk .chip { border-radius: 12px; }
body.theme-solarpunk .ab { border-radius: 0; }
body.theme-solarpunk .modal { border-radius: 16px; }

/* 04 VAPORWAVE — clinical white, RGB shift glitch shadow */
body.theme-vaporwave .pcard {
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  box-shadow: 3px 0 0 rgba(0,224,255,.18), -3px 0 0 rgba(255,45,142,.18), 0 8px 24px rgba(0,0,0,.05);
}
body.theme-vaporwave .pcard::before { display: none; }
body.theme-vaporwave .pc-name {
  background: linear-gradient(90deg, var(--pink), var(--cyan), var(--violet)) !important;
  -webkit-background-clip: text !important; background-clip: text !important;
  -webkit-text-fill-color: transparent !important;
  color: transparent !important;
  font-style: italic;
}
body.theme-vaporwave .modal { box-shadow: 4px 0 0 rgba(0,224,255,.20), -4px 0 0 rgba(255,45,142,.20), 0 30px 60px rgba(0,0,0,.10); }

/* 05 RISOGRAPH — paper grain + offset two-tone shadow */
body.theme-risograph {
  background:
    radial-gradient(circle at 0 0, rgba(43,74,138,.05) 1px, transparent 1.5px) 0 0/3px 3px,
    var(--bg-0) !important;
}
body.theme-risograph .pcard {
  border: 1.5px solid var(--ink-0);
  border-radius: 0;
  background: var(--bg-1);
  box-shadow: 4px 4px 0 var(--cyan), 8px 8px 0 var(--pink);
}
body.theme-risograph .pcard:hover { transform: translate(-1px,-1px); }
body.theme-risograph .pcard::before { display: none; }
body.theme-risograph .pc-name { font-family: 'Instrument Serif', serif; font-weight: 500; font-style: italic; }
body.theme-risograph .modal { border: 1.5px solid var(--ink-0); border-radius: 0; box-shadow: 6px 6px 0 var(--cyan), 12px 12px 0 var(--pink); }

/* 06 CYBERPUNK — neon outlines, scan lines, intense glow */
body.theme-cyberpunk {
  background:
    repeating-linear-gradient(0deg, transparent 0 2px, rgba(255,43,214,.025) 2px 3px),
    radial-gradient(ellipse 100% 50% at 50% 0%, rgba(255,43,214,.10), transparent 70%),
    var(--bg-0) !important;
}
body.theme-cyberpunk .pcard {
  border: 1px solid var(--pink);
  background: rgba(13,13,20,.85);
  box-shadow: 0 0 0 1px rgba(255,43,214,.20), inset 0 0 30px rgba(0,240,255,.05);
}
body.theme-cyberpunk .pcard:hover {
  box-shadow: 0 0 0 1px var(--pink), 0 0 24px rgba(255,43,214,.40), inset 0 0 30px rgba(0,240,255,.08);
}
body.theme-cyberpunk .pcard::before { background: linear-gradient(135deg, var(--pink), var(--cyan)); opacity: .8; }
body.theme-cyberpunk .pc-name {
  text-shadow: 0 0 10px var(--pink), 0 0 20px rgba(255,43,214,.50);
  letter-spacing: .03em;
}

/* 07 SUMI-E — minimal, brushy hairline, lots of whitespace */
body.theme-sumie .pcard {
  border: 1px solid var(--line);
  border-radius: 2px;
  background: var(--bg-1);
  box-shadow: 0 1px 0 var(--line-2);
  padding-top: 4px;
}
body.theme-sumie .pcard::before { display: none; }
body.theme-sumie .pcard::after { width: 2px; opacity: .8; }
body.theme-sumie .pc-name {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-size: 24px;
  letter-spacing: -.01em;
}
body.theme-sumie .pc-tags { padding-top: 6px; }
body.theme-sumie .badge,
body.theme-sumie .chip {
  border-radius: 0;
  border: none;
  border-bottom: 1px solid var(--ink-1);
  background: transparent !important;
  padding: 1px 0;
  margin-right: 8px;
}

/* 08 MANGA — halftone dots bg, comic borders */
body.theme-manga {
  background:
    radial-gradient(circle, rgba(0,0,0,.10) 1px, transparent 1.2px) 0 0/5px 5px,
    var(--bg-0) !important;
}
body.theme-manga .pcard {
  border: 2.5px solid var(--ink-0);
  border-radius: 0;
  background: var(--bg-1);
  box-shadow: 5px 5px 0 var(--ink-0);
}
body.theme-manga .pcard:hover { transform: translate(-1px,-1px); box-shadow: 7px 7px 0 var(--ink-0); }
body.theme-manga .pcard::before { display: none; }
body.theme-manga .pcard::after { width: 0; }
body.theme-manga .pc-name {
  font-family: 'Bangers', 'Rajdhani', sans-serif;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .02em;
  -webkit-text-stroke: 1px var(--ink-0);
}
body.theme-manga .badge,
body.theme-manga .chip {
  border: 2px solid var(--ink-0);
  border-radius: 0;
  font-weight: 800;
}
body.theme-manga .modal { border: 2.5px solid var(--ink-0); border-radius: 0; box-shadow: 8px 8px 0 var(--ink-0); }

/* 09 RAIN — wet asphalt, blur reflections, lamp halos */
body.theme-rain {
  background:
    radial-gradient(circle at 20% 80%, rgba(246,179,92,.10), transparent 35%),
    radial-gradient(circle at 80% 20%, rgba(122,216,255,.06), transparent 40%),
    var(--bg-0) !important;
}
body.theme-rain .pcard {
  border: 1px solid var(--line-2);
  background: linear-gradient(180deg, rgba(20,34,48,.7), rgba(15,26,35,.92));
  backdrop-filter: blur(4px);
  box-shadow: 0 8px 24px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.04);
}
body.theme-rain .pcard::before { background: linear-gradient(135deg, var(--sun), var(--cyan), var(--rust, var(--violet))); opacity: .5; }
body.theme-rain .pc-name { color: var(--ink-0); text-shadow: 0 0 12px rgba(246,179,92,.30); }

/* 10 AKIRA — high-contrast, blood drip, sharp angles */
body.theme-akira {
  background:
    radial-gradient(ellipse 60% 40% at 50% 100%, rgba(255,8,68,.12), transparent 70%),
    var(--bg-0) !important;
}
body.theme-akira .pcard {
  border: 1px solid var(--line-2);
  background: var(--bg-1);
  clip-path: polygon(0 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%);
}
body.theme-akira .pcard::before { background: linear-gradient(135deg, var(--pink), var(--cyan)); }
body.theme-akira .pcard.s-active::after { box-shadow: 0 0 18px var(--pink), 0 0 30px rgba(255,8,68,.4); }
body.theme-akira .pc-name {
  text-transform: uppercase;
  letter-spacing: .08em;
  font-weight: 800;
  text-shadow: 2px 0 0 rgba(255,8,68,.30);
}

/* 11 GHOST — terminal CRT, pure mono, scan lines */
body.theme-ghost {
  background:
    repeating-linear-gradient(0deg, transparent 0 1px, rgba(0,255,213,.025) 1px 2px),
    var(--bg-0) !important;
}
body.theme-ghost .pcard {
  border: 1px solid var(--cyan);
  background: rgba(8,17,22,.92);
  border-radius: 0;
  box-shadow: 0 0 0 1px rgba(0,255,213,.10);
}
body.theme-ghost .pcard:hover { box-shadow: 0 0 0 1px var(--cyan), 0 0 16px rgba(0,255,213,.30); }
body.theme-ghost .pcard::before { display: none; }
body.theme-ghost .pc-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  letter-spacing: .04em;
  text-transform: lowercase;
}
body.theme-ghost .pc-name::before { content: '> '; color: var(--cyan); opacity: .6; }
body.theme-ghost .badge,
body.theme-ghost .chip { border-radius: 0; font-family: 'JetBrains Mono', monospace; }
body.theme-ghost .modal { border: 1px solid var(--cyan); border-radius: 0; box-shadow: 0 0 0 1px rgba(0,255,213,.20), 0 30px 80px rgba(0,0,0,.8); }

/* ═════════ ANIMATED BACKGROUNDS PER THEME ═════════ */
#theme-fx {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
  isolation: isolate;
}
/* body bg pinta antes que theme-fx — para no taparlo en is-light */
body.is-light { background: var(--bg-0) !important; }
body:not(.theme-synthwave):not(.is-light) { background: var(--bg-0) !important; }
#theme-fx .fx {
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity .4s;
  will-change: transform, background-position;
}
/* global cap — never let fx overpower content */
body:not(.theme-synthwave) #theme-fx { opacity: .85; }
/* synthwave keeps its native body::before/::after, no overlay */
body.theme-synthwave #theme-fx { display: none; }

/* ── 01 BRUTALIST: paper grain + vignette (sin flash) ── */
body.theme-brutalist #theme-fx .fx-a {
  opacity: 1;
  background: repeating-linear-gradient(0deg, transparent 0 5px, rgba(0,0,0,.025) 5px 6px);
  animation: brut-shift 5s linear infinite;
}
body.theme-brutalist #theme-fx .fx-b { display: none; }
body.theme-brutalist #theme-fx .fx-c {
  opacity: 1;
  background: radial-gradient(circle at 50% 50%, transparent 65%, rgba(0,0,0,.10));
}
@keyframes brut-shift { to { background-position: 0 6px; } }

/* ── 02 BLUEPRINT: drifting grid + plot pulse ── */
body.theme-blueprint #theme-fx .fx-a {
  opacity: 1;
  background:
    repeating-linear-gradient(0deg, transparent 0 23px, rgba(92,242,255,.07) 23px 24px),
    repeating-linear-gradient(90deg, transparent 0 23px, rgba(92,242,255,.07) 23px 24px);
  animation: bp-drift 30s linear infinite;
}
body.theme-blueprint #theme-fx .fx-b {
  opacity: 1;
  background:
    repeating-linear-gradient(0deg, transparent 0 119px, rgba(92,242,255,.10) 119px 120px),
    repeating-linear-gradient(90deg, transparent 0 119px, rgba(92,242,255,.10) 119px 120px);
}
body.theme-blueprint #theme-fx .fx-c { display: none; }
@keyframes bp-drift { to { background-position: 24px 24px, 24px 24px; } }
@keyframes bp-plot { 0%,100% { transform: scale(1); opacity: .4; } 50% { transform: scale(1.2); opacity: .8; } }

/* ── 03 SOLARPUNK: leaf drift + escena hero (fx-d) ── */
body.theme-solarpunk #theme-fx .fx-a { display: none; }
body.theme-solarpunk #theme-fx .fx-b { display: none; }
body.theme-solarpunk #theme-fx .fx-c {
  opacity: 1;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><g fill='%235a8a3a' opacity='.18'><path d='M30 20 Q40 5 55 20 Q40 35 30 20 M150 60 Q160 45 175 60 Q160 75 150 60 M70 130 Q80 115 95 130 Q80 145 70 130 M170 160 Q180 145 195 160 Q180 175 170 160'/></g></svg>");
  animation: sp-drift 40s linear infinite;
}
@keyframes sp-breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
@keyframes sp-rays    { to { transform: rotate(20deg); } }
@keyframes sp-drift   { from { background-position: 0 0; } to { background-position: 200px 200px; } }

/* ── 04 VAPORWAVE: perspective grid + sun rising + gradient shift ── */
body.theme-vaporwave #theme-fx .fx-a {
  opacity: 1;
  background: linear-gradient(180deg, rgba(255,45,142,0) 50%, rgba(255,45,142,.10) 75%, rgba(122,45,255,.18) 100%);
  animation: vw-shift 6s ease-in-out infinite alternate;
}
body.theme-vaporwave #theme-fx .fx-b {
  opacity: 1;
  bottom: 0; top: auto; height: 50%;
  background:
    repeating-linear-gradient(180deg, transparent 0 60px, rgba(0,224,255,.18) 60px 61px),
    repeating-linear-gradient(90deg,  transparent 0 60px, rgba(255,45,142,.14) 60px 61px);
  transform: perspective(500px) rotateX(60deg);
  transform-origin: bottom;
  animation: vw-grid 4s linear infinite;
}
body.theme-vaporwave #theme-fx .fx-c {
  opacity: 1;
  width: 360px; height: 360px;
  left: 50%; top: 30%;
  inset: auto;
  margin-left: -180px;
  background: radial-gradient(circle, rgba(255,45,142,.50), rgba(122,45,255,.30) 50%, transparent 70%);
  border-radius: 50%;
  animation: vw-sun 10s ease-in-out infinite;
}
@keyframes vw-shift { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(20deg); } }
@keyframes vw-grid  { to { background-position: 0 60px, 60px 0; } }
@keyframes vw-sun   { 0%,100% { transform: translateY(0) scale(1); opacity: .6; } 50% { transform: translateY(-12px) scale(1.04); opacity: .9; } }

/* ── 05 RISOGRAPH: shifting paper grain + RGB jiggle ── */
body.theme-risograph #theme-fx .fx-a {
  opacity: 1;
  background: radial-gradient(circle, rgba(43,74,138,.10) 1px, transparent 1.5px) 0 0/3px 3px;
  animation: riso-grain 1s steps(4) infinite;
}
body.theme-risograph #theme-fx .fx-b {
  opacity: .6;
  background: radial-gradient(circle, rgba(210,59,42,.08) 1px, transparent 1.5px) 1px 1px/4px 4px;
  animation: riso-grain2 1.3s steps(4) infinite reverse;
}
body.theme-risograph #theme-fx .fx-c {
  opacity: 1;
  background: linear-gradient(135deg, rgba(216,162,59,.05), transparent 60%);
}
@keyframes riso-grain  { 0% { background-position: 0 0; } 25% { background-position: 1px 0; } 50% { background-position: 1px 1px; } 75% { background-position: 0 1px; } 100% { background-position: 0 0; } }

/* ── 07 SUMI-E: Mt. Fuji + sol rojo + sakura cayendo ── */

@keyframes sumi-wash    { 0%,100% { opacity: .7; } 50% { opacity: 1; } }
@keyframes sumi-petals  { from { background-position: 0 -300px; } to { background-position: 50px 100vh; } }
@keyframes sumi-petals2 { from { background-position: 0 -400px; } to { background-position: -80px 100vh; } }

/* ── 08 MANGA: speed lines + halftone dots scrolling + shock burst ── */
body.theme-manga #theme-fx .fx-a {

}

}

body.theme-rain #theme-fx .fx-a {

  animation: rain-fall 0.6s linear infinite;
}

body.theme-akira #theme-fx .fx-a {
  opacity: 1;
  background:
    radial-gradient(ellipse 70% 50% at 50% 100%, rgba(255,8,68,.30), transparent 70%),
