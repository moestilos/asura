  /* ═════════ Bot helpers ═════════ */
  function botRate(bot) {
    const now = Date.now()
    const last5 = bot.rateBuckets.filter(b => now - b.ts <= 5 * 60_000)
    if (!last5.length) return 0
    const sum = last5.reduce((a, b) => a + b.count, 0)
    return sum / Math.max(1, last5.length)
  }
  function botETA(bot) {
    if (!bot.target || bot.status !== 'running') return null
    const rate = botRate(bot)
    if (rate <= 0) return null
    return ((bot.target - bot.ticks) / rate) * 60_000
  }
  function statusColor(status) {
    return ({ running: '#00d97e', paused: '#f9a825', idle: '#f9a825', stuck: '#f9a825', done: '#4cc9f0', crashed: '#ef4444' })[status] || '#7a818c'
  }

  function renderRing(pct, color, sizePx, tokLabel, subPct) {
    const s = sizePx, cx = s / 2, r = (s - 8) / 2, C = 2 * Math.PI * r
    const v = Math.min(100, Math.max(0, isNaN(pct) ? 0 : pct))
    const off = (C * (1 - v / 100)).toFixed(1)
    const fsTok = s >= 100 ? 18 : 13, fsPct = s >= 100 ? 11 : 9
    return (
      '<svg class="bm-prog-svg" width="' + s + '" height="' + s + '" viewBox="0 0 ' + s + ' ' + s + '">' +
        '<circle cx="' + cx + '" cy="' + cx + '" r="' + r + '" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="4"/>' +
        '<circle cx="' + cx + '" cy="' + cx + '" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="4"' +
          ' stroke-linecap="round" stroke-dasharray="' + C + '" stroke-dashoffset="' + off + '"' +
          ' transform="rotate(-90 ' + cx + ' ' + cx + ')"' +
          ' style="filter:drop-shadow(0 0 4px ' + color + '55);transition:stroke-dashoffset .6s ease"/>' +
        (tokLabel !== null && tokLabel !== undefined ?
          '<text x="' + cx + '" y="' + (cx - (s >= 100 ? 4 : 3)) + '" text-anchor="middle" dominant-baseline="middle"' +
            ' font-family="JetBrains Mono, monospace" font-weight="700" font-size="' + fsTok + '" fill="#f5f7fa">' + tokLabel + '</text>' : ''
        ) +
        (subPct !== undefined && subPct !== null ?
          '<text x="' + cx + '" y="' + (cx + (s >= 100 ? 14 : 11)) + '" text-anchor="middle" dominant-baseline="middle"' +
            ' font-family="JetBrains Mono, monospace" font-weight="600" font-size="' + fsPct + '" fill="' + color + '">' + subPct + '%</text>' : ''
        ) +
      '</svg>'
    )
  }

  function renderSparkline(buckets, w, h, color) {
    if (!buckets.length) {
      return '<svg viewBox="0 0 ' + w + ' ' + h + '"><line x1="0" y1="' + (h/2) + '" x2="' + w + '" y2="' + (h/2) + '" stroke="' + color + '33" stroke-dasharray="2 4"/></svg>'
    }
    const now = Date.now()
    const grid = []
    for (let i = 0; i < 60; i++) {
      const ts = Math.floor((now - (59 - i) * 60_000) / 60_000) * 60_000
      const b = buckets.find(x => x.ts === ts)
      grid.push(b ? b.count : 0)
    }
    const max = Math.max(...grid, 1)
    const pts = grid.map((v, i) => {
      const x = (i / 59) * w
      const y = h - (v / max) * (h - 4) - 2
      return x.toFixed(1) + ',' + y.toFixed(1)
    }).join(' ')
    const areaPts = '0,' + h + ' ' + pts + ' ' + w + ',' + h
    return (
      '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
        '<polygon points="' + areaPts + '" fill="' + color + '" fill-opacity=".15"/>' +
        '<polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>' +
      '</svg>'
    )
  }

  function renderBotHero(bot) {
    const pct = bot.target ? (bot.ticks / bot.target) * 100 : 0
    const rate = botRate(bot), eta = botETA(bot), color = statusColor(bot.status)
    const lastErr = bot.errorHistory[0]
    const ringSize = 120, cx = ringSize / 2, r = (ringSize - 10) / 2, C = 2 * Math.PI * r
    const v = Math.min(100, Math.max(0, isNaN(pct) ? 0 : pct))
    const off = (C * (1 - v / 100)).toFixed(1)

    const ringSvg =
      '<svg width="' + ringSize + '" height="' + ringSize + '" viewBox="0 0 ' + ringSize + ' ' + ringSize + '">' +
        '<circle cx="' + cx + '" cy="' + cx + '" r="' + r + '" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="6"/>' +
        '<circle cx="' + cx + '" cy="' + cx + '" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="6"' +
          ' stroke-linecap="round" stroke-dasharray="' + C + '" stroke-dashoffset="' + off + '"' +
          ' transform="rotate(-90 ' + cx + ' ' + cx + ')"' +
          ' style="filter:drop-shadow(0 0 6px ' + color + '66);transition:stroke-dashoffset .6s ease"/>' +
        (bot.target ?
          '<text x="' + cx + '" y="' + (cx - 8) + '" text-anchor="middle" dominant-baseline="middle"' +
            ' font-family="JetBrains Mono, monospace" font-weight="700" font-size="22" fill="#f5f7fa">' +
            Math.min(99, pct).toFixed(0) + '%</text>'
          :
          '<text x="' + cx + '" y="' + cx + '" text-anchor="middle" dominant-baseline="middle"' +
            ' font-family="JetBrains Mono, monospace" font-weight="700" font-size="20" fill="#f5f7fa">' +
            fmtNum(bot.ticks) + '</text>'
        ) +
        (bot.target ?
          '<text x="' + cx + '" y="' + (cx + 14) + '" text-anchor="middle" dominant-baseline="middle"' +
            ' font-family="JetBrains Mono, monospace" font-weight="600" font-size="10" fill="' + color + '">' +
            fmtNum(bot.ticks) + '</text>' : ''
        ) +
      '</svg>'

    const isControllable = bot.status === 'running' || bot.status === 'paused' || bot.status === 'idle' || bot.status === 'stuck'
    const pauseBtn = isControllable
      ? `<button class="ab" onclick="${bot.paused ? 'resumeBot' : 'pauseBot'}('${bot.id}')">${bot.paused ? ICO.play + ' reanudar' : ICO.pause + ' pausar'}</button>`
      : ''

    return (
      '<div class="bot-hero s-' + bot.status + '">' +
        '<div class="bh-top">' +
          '<div class="bh-info">' +
            '<div class="bh-name">' + escapeHtml(bot.name) + '</div>' +
            (bot.project ? '<div class="bh-proj">' + escapeHtml(bot.project) + '</div>' : '') +
          '</div>' +
          '<span class="bh-status ' + bot.status + '"><span class="ddot"></span>' + bot.status + '</span>' +
        '</div>' +
        '<div class="bh-body">' +
          '<div class="bh-ring-wrap">' + ringSvg + '</div>' +
          '<div class="bh-stats">' +
            '<div class="bh-stat"><div class="bh-stat-l">items</div><div class="bh-stat-v">' +
              fmtNum(bot.ticks) + (bot.target ? ' <span style="color:var(--tx-3);font-size:11px">/ ' + fmtNum(bot.target) + '</span>' : '') +
            '</div></div>' +
            '<div class="bh-stat"><div class="bh-stat-l">rate · /min</div><div class="bh-stat-v">' + rate.toFixed(1) + '</div></div>' +
            '<div class="bh-stat"><div class="bh-stat-l">eta</div><div class="bh-stat-v">' + fmtETA(eta) + '</div></div>' +
            '<div class="bh-stat"><div class="bh-stat-l">errores</div><div class="bh-stat-v ' + (bot.errors > 0 ? 'red' : '') + '">' + bot.errors + '</div></div>' +
            (bot.procStat && bot.procStat.alive && bot.procStat.memMB ?
              '<div class="bh-stat"><div class="bh-stat-l">memoria</div><div class="bh-stat-v">' + bot.procStat.memMB.toFixed(0) + ' MB</div></div>' : ''
            ) +
          '</div>' +
        '</div>' +
        (bot.currentItem ? '<div class="bh-current">→ ' + escapeHtml(bot.currentItem) + '</div>' : '') +
        '<div class="bh-spark">' +
          '<div class="bh-spark-hdr"><span>rate · últimos 60min</span><b>' + rate.toFixed(1) + ' /min</b></div>' +
          renderSparkline(bot.rateBuckets, 280, 36, color) +
        '</div>' +
        (bot.anomalyFlagged ? '<div class="bh-anomaly">⚠ rate caído &gt;50% — posible captcha o IP ban</div>' : '') +
        (lastErr ? '<div class="bh-errors">⚠ <b>' + escapeHtml(lastErr.msg.slice(0, 100)) + '</b></div>' : '') +
        '<div class="bh-actions">' +
          pauseBtn +
          '<button class="ab" onclick="openBotSamples(\'' + bot.id + '\')">' + ICO.eye + ' ver samples</button>' +
          ((bot.status === 'done' || bot.status === 'crashed') ? '<button class="ab" onclick="clearBot(\'' + bot.id + '\')">' + ICO.trash + ' quitar</button>' : '') +
        '</div>' +
      '</div>'
    )
  }

  function renderBotMini(bot) {
    const pct = bot.target ? (bot.ticks / bot.target) * 100 : 0
    const rate = botRate(bot), color = statusColor(bot.status)
    const ringLabel = bot.target ? Math.min(99, pct).toFixed(0) : null
    return (
      '<div class="bot-mini s-' + bot.status + '">' +
        '<div class="bm-top">' +
          '<div class="bm-name">' + escapeHtml(bot.name) + '</div>' +
          '<span class="bh-status ' + bot.status + '" style="font-size:8.5px;padding:2px 6px"><span class="ddot"></span>' + bot.status + '</span>' +
        '</div>' +
        '<div class="bm-prog">' +
          renderRing(pct, color, 60, ringLabel, ringLabel) +
          '<div class="bm-prog-info">' +
            '<div class="bm-prog-num">' + fmtNum(bot.ticks) + (bot.target ? '<span class="bm-prog-target"> / ' + fmtNum(bot.target) + '</span>' : '') + '</div>' +
            '<div class="bm-prog-rate">' + rate.toFixed(1) + ' /min · ' + bot.errors + ' err</div>' +
          '</div>' +
        '</div>' +
        ((bot.status === 'done' || bot.status === 'crashed') ?
          '<button class="bot-clear" style="position:absolute;top:8px;right:8px" onclick="clearBot(\'' + bot.id + '\')" title="quitar">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
          '</button>' : ''
        ) +
      '</div>'
    )
  }

      '</div>'

    openModal('Samples · ' + bot.name, html)

  /* ═════════ Project card ═════════ */
  function commitSparkSvg(buckets) {
    const todayIdx = 13
    return '<div class="pc-spark">' + buckets.map((c, i) => {
      const max = Math.max(...buckets, 1)
      const h = c > 0 ? Math.max(2, (c / max) * 16) : 1
      const cls = i === todayIdx ? 'today' : (c > 0 ? 'has' : '')
      return '<div class="pc-spark-bar ' + cls + '" style="height:' + h + 'px" title="' + c + ' commits"></div>'
    }).join('') + '</div>'
  }

  function projectCard(p) {
    /* unified tags row: prod link + dev port + bot + dirty + stack chips */
    const tags = []
    if (p.prodUrl) {
      const host = (() => { try { return new URL(p.prodUrl).host } catch { return p.prodUrl } })()
      tags.push('<span class="badge prod" title="abrir en navegador · ' + escapeAttr(p.prodUrl) + '" onclick="event.stopPropagation();doAction(\'open-dev-url\',\'' + escapeAttr(p.name) + '\',\'' + escapeAttr(p.prodUrl) + '\')">' + ICO.open + ' ' + escapeHtml(host) + '</span>')
    }
    if (p.devPort)            tags.push('<span class="badge dev" title="dev server vivo">DEV :' + p.devPort + '</span>')
    if (p.git.dirtyCount > 0) tags.push('<span class="badge dirty" title="' + p.git.dirtyCount + ' archivos sin commit">' + ICO.diff + p.git.dirtyCount + '</span>')
    if (p.hasBots)            tags.push('<span class="badge bot" title="proyecto con bots">' + ICO.bot + 'BOT</span>')
    for (const s of (p.stack || []).slice(0, 5)) {
      tags.push('<span class="chip" data-s="' + escapeAttr(s) + '">' + escapeHtml(s) + '</span>')
    }
    const tagsHtml = tags.length ? '<div class="pc-tags">' + tags.join('') + '</div>' : ''

    let aheadBehindHtml = ''
    if (p.git.ahead || p.git.behind) {
      const parts = []
      if (p.git.ahead)  parts.push('<span class="ahead" title="commits ahead">↑' + p.git.ahead + '</span>')
      if (p.git.behind) parts.push('<span class="behind" title="commits behind">↓' + p.git.behind + '</span>')
      aheadBehindHtml = ' ' + parts.join(' ')
    }

    const pathHtml = p.name.includes('/') ? '<div class="pc-path">' + escapeHtml(p.name) + '</div>' : ''
    const displayName = p.name.includes('/') ? p.name.split('/').pop() : p.name
    const newTag = p.isNew
      ? '<span class="pc-new-tag">nuevo<span class="pc-new-x" title="quitar" onclick="event.stopPropagation();window.asura.dismissNew(\'' + escapeAttr(p.name) + '\')">×</span></span>'
      : ''

    const metaRows = []
    if (p.git.branch) {
      metaRows.push(
        '<div class="pc-meta-row">' +
          '<span class="pc-meta-icon">' + ICO.git + '</span>' +
          '<span class="pc-meta-v"><b>' + escapeHtml(p.git.branch) + '</b>' + aheadBehindHtml + '</span>' +
        '</div>')
    }
    if (p.git.lastCommitMsg) {
      const msgShort = p.git.lastCommitMsg.length > 50 ? p.git.lastCommitMsg.slice(0, 50) + '…' : p.git.lastCommitMsg
      metaRows.push(
        '<div class="pc-meta-row" title="' + escapeAttr(p.git.lastCommitMsg) + '">' +
          '<span class="pc-meta-icon">' + ICO.commit + '</span>' +
          '<span class="pc-meta-v">' + escapeHtml(msgShort) + '</span>' +
          '<span class="pc-meta-time">' + relTime(p.git.lastCommitTs) + '</span>' +
        '</div>')
    }

    const sparkline = commitSparkSvg(p.commitsByDay || new Array(14).fill(0))

    const actions = []
    /* primary action: prefer live dev > prod > editor */
    if (p.devPort) {
      actions.push('<button class="ab primary" onclick="event.stopPropagation();doAction(\'open-dev-url\',\'' + escapeAttr(p.name) + '\',\'http://localhost:' + p.devPort + '\')" title="abrir :' + p.devPort + '">' + ICO.open + ' :' + p.devPort + '</button>')
    } else if (p.prodUrl) {
      actions.push('<button class="ab primary" onclick="event.stopPropagation();doAction(\'open-dev-url\',\'' + escapeAttr(p.name) + '\',\'' + escapeAttr(p.prodUrl) + '\')" title="abrir producción · ' + escapeAttr(p.prodUrl) + '">' + ICO.open + ' prod</button>')
    }
    /* always offer editor */
    actions.push('<button class="ab" onclick="event.stopPropagation();doAction(\'open-vscode\',\'' + escapeAttr(p.name) + '\')" title="abrir en editor">' + ICO.code + ' editor</button>')
    /* if devPort exists AND prod also detected, add prod as secondary */
    if (p.devPort && p.prodUrl) {
      actions.push('<button class="ab icon-only" onclick="event.stopPropagation();doAction(\'open-dev-url\',\'' + escapeAttr(p.name) + '\',\'' + escapeAttr(p.prodUrl) + '\')" title="abrir producción · ' + escapeAttr(p.prodUrl) + '">' + ICO.open + '</button>')
    }
    actions.push('<button class="ab icon-only" onclick="event.stopPropagation();doAction(\'open-terminal\',\'' + escapeAttr(p.name) + '\')" title="terminal + claude">' + ICO.term + '</button>')
    actions.push('<button class="ab icon-only" onclick="event.stopPropagation();doAction(\'open-folder\',\'' + escapeAttr(p.name) + '\')" title="carpeta">' + ICO.folder + '</button>')
    if (p.hasHandoff) {
      actions.push('<button class="ab icon-only" onclick="event.stopPropagation();doAction(\'open-handoff\',\'' + escapeAttr(p.name) + '\',\'' + escapeAttr(p.handoffPath) + '\')" title="HANDOFF.md">' + ICO.book + '</button>')
    }

    return (
      '<div class="pcard s-' + p.status + (p.favorite ? ' fav' : '') + (p.isNew ? ' is-new' : '') + '"' +
        ' data-name="' + escapeAttr(p.name) + '"' +
        ' onclick="openDetailModal(\'' + escapeAttr(p.name) + '\')"' +
        ' oncontextmenu="event.preventDefault();showContextMenu(event,\'' + escapeAttr(p.name) + '\')">' +
        '<button class="pcard-fav-star" onclick="event.stopPropagation();toggleFav(\'' + escapeAttr(p.name) + '\')" title="' + (p.favorite ? 'quitar de favoritos' : 'añadir a favoritos') + '">' +
          (p.favorite ? ICO.star : ICO.starOutline) +
        '</button>' +
        '<div class="pc-top">' +
          '<span class="pc-stat-dot ' + p.status + '" title="' + p.status + '"></span>' +
          '<div class="pc-title">' +
            '<div class="pc-name">' + escapeHtml(displayName) + newTag + '</div>' +
            pathHtml +
          '</div>' +
        '</div>' +
        tagsHtml +
        '<div class="pc-meta">' + metaRows.join('') + '</div>' +
        sparkline +
        '<div class="pc-actions">' + actions.join('') + '</div>' +
      '</div>'
    )
  }

  /* ═════════ Context menu ═════════ */
  function showContextMenu(ev, name) {
    const proj = projects.find(p => p.name === name)
    if (!proj) return
    const ctx = document.getElementById('ctx-menu')
    const items = [
      { icon: ICO.code,   label: 'Abrir en editor',   run: () => doAction('open-vscode', name) },
      { icon: ICO.term,   label: 'Terminal + claude', run: () => doAction('open-terminal', name) },
      { icon: ICO.folder, label: 'Abrir carpeta',     run: () => doAction('open-folder', name) },
      { sep: true },
      { icon: ICO.star,   label: proj.favorite ? 'Quitar de favoritos' : 'Marcar favorito', run: async () => { await window.asura.toggleFavorite(name); toast(proj.favorite ? 'sin favorito' : 'favorito') } },
      { icon: ICO.eyeOff, label: proj.hidden ? 'Mostrar' : 'Ocultar',                       run: async () => { await window.asura.toggleHidden(name); toast(proj.hidden ? 'mostrando' : 'oculto') } },
    ]
    ctx.innerHTML = items.map(it => it.sep
      ? '<div class="ctx-sep"></div>'
      : '<div class="ctx-item" onclick="(' + it.run.toString() + ')();document.getElementById(\'ctx-menu\').classList.remove(\'on\')">' + it.icon + '<span>' + escapeHtml(it.label) + '</span></div>'
    ).join('')
    ctx.style.left = Math.min(ev.clientX, window.innerWidth - 220) + 'px'
    ctx.style.top  = Math.min(ev.clientY, window.innerHeight - ctx.offsetHeight - 20) + 'px'
    ctx.classList.add('on')
  }
  document.addEventListener('click', (e) => {
    const ctx = document.getElementById('ctx-menu')
    if (!ctx.contains(e.target)) ctx.classList.remove('on')
  })
  window.showContextMenu = showContextMenu

  /* ═════════ Render ═════════ */
  function render() {
    const visibleProjects = projects.filter(p => !p.hidden)
    const nApps   = visibleProjects.length
    const nActive = visibleProjects.filter(p => p.status === 'active' || p.devPort).length
    const nDev    = visibleProjects.filter(p => p.devPort).length
    const nBots   = bots.filter(b => b.status === 'running' || b.status === 'paused' || b.status === 'idle' || b.status === 'stuck').length
    const nAlerts = config && config.alertsHistory ? config.alertsHistory.length : 0

    document.getElementById('cnt-apps').textContent   = nApps
    document.getElementById('cnt-bots').textContent   = nBots
    document.getElementById('cnt-alerts').textContent = nAlerts
    document.getElementById('s-active').textContent   = nActive
    document.getElementById('s-dev').textContent      = nDev
    document.getElementById('s-bots').textContent     = bots.filter(b => b.status === 'running').length
    document.getElementById('total-projects').textContent = nApps

    const main = document.getElementById('main')
    const toolbar = document.getElementById('toolbar-apps')

    if (activeTab === 'apps') {
      toolbar.style.display = 'flex'
      let filtered = visibleProjects
      if (activeFilter === 'favorites') filtered = filtered.filter(p => p.favorite)
      if (activeFilter === 'active')    filtered = filtered.filter(p => p.status === 'active' || p.devPort)
      if (activeFilter === 'bots')      filtered = filtered.filter(p => p.hasBots)
      if (searchQuery) {
        filtered = filtered.filter(p =>
          p.name.toLowerCase().includes(searchQuery) ||
          (p.stack || []).some(s => s.toLowerCase().includes(searchQuery)) ||
          (p.git.branch || '').toLowerCase().includes(searchQuery))
      }
      if (!filtered.length) {
        main.innerHTML = '<div class="placeholder"><div class="placeholder-icon">' + ICO.eye + '</div><h3>Sin resultados</h3><p>Ningún proyecto coincide con tu filtro</p></div>'
      } else {
        main.innerHTML = '<div class="grid">' + filtered.map(projectCard).join('') + '</div>'
      }
    }

    else if (activeTab === 'bots') {
      toolbar.style.display = 'none'
      if (!bots.length) {
        main.innerHTML = `
          <div class="placeholder">
            <div class="placeholder-icon">${ICO.bot}</div>
            <h3>Sin bots todavía</h3>
            <p>Daemon escuchando en <code>127.0.0.1:27315</code></p>
            <p style="margin-top:14px">Importa el SDK en tu scraper:</p>
            <p style="margin-top:8px"><code>const bot = await sw.bot('mi-scraper', { target: 15000 })</code></p>
            <p style="margin-top:4px"><code>bot.tick({ item: url })</code></p>
            <p style="margin-top:14px;font-size:10px;color:var(--tx-3)">SDK Node + Python en <code>apps/asura/sdk/</code></p>
          </div>
        `
      } else {
        const active = bots.filter(b => b.status !== 'done' && b.status !== 'crashed')
        const archive = bots.filter(b => b.status === 'done' || b.status === 'crashed')
        const heroBot = active[0] || archive[0]
        const rest = bots.filter(b => b.id !== heroBot.id)
        main.innerHTML = (
          '<div class="bots-wrap">' +
            renderBotHero(heroBot) +
            (rest.length ? '<div class="bots-section-h">otros bots</div><div class="bots-grid">' + rest.map(renderBotMini).join('') + '</div>' : '') +
          '</div>'
        )
      }
    }

    else if (activeTab === 'infra') {
      toolbar.style.display = 'none'
      main.innerHTML = renderInfra()
    }

    else if (activeTab === 'alerts') {
      toolbar.style.display = 'none'
      const alerts = (config && config.alertsHistory) || []
      if (!alerts.length) {
        main.innerHTML = `
          <div class="placeholder">
            <div class="placeholder-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            </div>
            <h3>Sin alertas</h3>
            <p>Aquí verás historial de eventos: bots completados, crashes, anomalías, branches stale.</p>
          </div>
        `
      } else {
        main.innerHTML = `
          <div class="alerts-toolbar">
            <h3>Historial · ${alerts.length}</h3>
            <button class="alerts-clear" onclick="clearAllAlerts()">limpiar todo</button>
          </div>
          <div class="alerts-list">${alerts.map(a => alertRow(a)).join('')}</div>
        `
      }
    }
  }

  /* ═════════ Infra (containers) ═════════ */
  function rtLabel(rt) { return rt === 'wsl-docker' ? 'WSL' : rt.toUpperCase() }
  function rtClass(rt) {
    if (rt === 'podman') return 'podman'
    if (rt === 'wsl-docker') return 'wsl'
    return 'docker'
  }
  function shortPorts(ports) {
    if (!ports) return ''
    const seen = []
    for (const p of String(ports).split(',')) {
      const t = p.trim()
      if (t && !seen.includes(t)) seen.push(t)
    }
    return seen.slice(0, 2).join(' · ')
  }
  function dockerImageType(image) {
    const i = (image || '').toLowerCase()
    if (/postgres|mysql|mariadb|mongo|redis|cassandra|cockroach|clickhouse|sqlserver|oracle|surreal|neo4j|elastic|opensearch|influx|timescale/.test(i)) return 'db'
    if (/nginx|caddy|traefik|haproxy|envoy/.test(i)) return 'proxy'
    if (/grafana|prometheus|loki|tempo|jaeger|kibana|datadog|sentry/.test(i)) return 'observ'
    if (/rabbitmq|kafka|nats|pulsar/.test(i)) return 'queue'
    if (/minio|s3/.test(i)) return 'storage'
    return 'app'
  }
  function infraStateClass(state) { return state || 'unknown' }
  function barCls(pct) {
    if (pct >= 80) return 'hot'
    if (pct >= 50) return 'warm'
    return ''
  }

  function renderContainerCard(c) {
    const isRunning = c.state === 'running'
    const isPaused  = c.state === 'paused'
    const ports = shortPorts(c.ports)
    const cpuPct = Math.min(100, Math.max(0, c.cpuPct || 0))
    const memPct = Math.min(100, Math.max(0, c.memPct || 0))
    const kind = dockerImageType(c.image)

    let actions = ''
    if (isRunning) {
      actions = (
        '<button class="ab" onclick="event.stopPropagation();window.asura.containerAction(\'' + c.runtime + '\',\'' + c.id + '\',\'restart\')" title="reiniciar">' + ICO.diff + ' restart</button>' +
        '<button class="ab" onclick="event.stopPropagation();window.asura.containerAction(\'' + c.runtime + '\',\'' + c.id + '\',\'stop\')" title="parar">' + ICO.pause + ' stop</button>'
      )
    } else if (isPaused) {
      actions = '<button class="ab primary" onclick="event.stopPropagation();window.asura.containerAction(\'' + c.runtime + '\',\'' + c.id + '\',\'unpause\')">' + ICO.play + ' resume</button>'
    } else {
      actions = '<button class="ab primary" onclick="event.stopPropagation();window.asura.containerAction(\'' + c.runtime + '\',\'' + c.id + '\',\'start\')">' + ICO.play + ' start</button>'
    }

    return (
      '<div class="pcard infra-card s-' + infraStateClass(c.state) + ' k-' + kind + (isRunning ? ' running' : '') + '">' +
        '<div class="pc-top">' +
          '<span class="pc-stat-dot ' + (isRunning ? 'active' : (c.state === 'paused' ? 'idle' : 'archived')) + '"></span>' +
          '<div class="pc-title">' +
            '<div class="pc-name">' + escapeHtml(c.name || c.id) + '</div>' +
            '<div class="pc-path">' + escapeHtml(c.image) + '</div>' +
          '</div>' +
          '<span class="badge rt rt-' + rtClass(c.runtime) + '" title="' + rtLabel(c.runtime) + '">' + rtLabel(c.runtime) + '</span>' +
        '</div>' +
        '<div class="pc-badges">' +
          '<span class="badge kind-' + kind + '">' + kind.toUpperCase() + '</span>' +
          (ports ? '<span class="badge ports">' + escapeHtml(ports) + '</span>' : '') +
          '<span class="badge state-' + infraStateClass(c.state) + '">' + escapeHtml(c.state || '?') + '</span>' +
        '</div>' +
        (isRunning
          ? '<div class="pc-meta infra-bars">' +
              '<div class="bar"><div class="bar-head"><span>CPU</span><span class="bar-v">' + escapeHtml(c.cpu) + '</span></div><div class="bar-track"><div class="bar-fill ' + barCls(cpuPct) + '" style="width:' + cpuPct + '%"></div></div></div>' +
              '<div class="bar"><div class="bar-head"><span>RAM</span><span class="bar-v">' + memPct.toFixed(1) + '%</span></div><div class="bar-track"><div class="bar-fill ' + barCls(memPct) + '" style="width:' + memPct + '%"></div></div></div>' +
            '</div>'
          : '<div class="pc-meta"><div class="pc-meta-row"><span class="pc-meta-v">' + escapeHtml(c.status || '—') + '</span></div></div>'
        ) +
        '<div class="pc-actions">' + actions + '</div>' +
      '</div>'
    )
  }

  function renderInfra() {
    if (!infra || !infra.runtimes) return '<div class="placeholder"><div class="placeholder-icon">⏳</div><h3>Detectando runtimes</h3><p>Buscando docker · podman · wsl…</p></div>'

    const all = []
    for (const r of infra.runtimes) for (const c of (r.containers || [])) all.push(c)
    all.sort((a, b) => {
      if ((a.state === 'running') !== (b.state === 'running')) return a.state === 'running' ? -1 : 1
      if (a.runtime !== b.runtime) return a.runtime.localeCompare(b.runtime)
      return (a.name || '').localeCompare(b.name || '')
    })

    const pills = infra.runtimes.filter(r => r.available).map(r => {
      const cls = r.daemonUp ? 'on' : 'down'
      return '<span class="rt-pill ' + cls + '"><span class="d"></span>' + rtLabel(r.runtime) + '</span>'
    }).join('')

    if (!all.length) {
      const anyUp = infra.runtimes.some(r => r.available && r.daemonUp)
      const anyAvail = infra.runtimes.some(r => r.available)
      return (
        '<div class="infra-head">' + pills + '</div>' +
        '<div class="placeholder">' +
          '<div class="placeholder-icon">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="8" ry="2.5"/><path d="M4 5v6c0 1.4 3.6 2.5 8 2.5s8-1.1 8-2.5V5"/><path d="M4 11v6c0 1.4 3.6 2.5 8 2.5s8-1.1 8-2.5v-6"/></svg>' +
          '</div>' +
          '<h3>' + (!anyAvail ? 'Sin runtime detectado' : (anyUp ? 'Sin contenedores' : 'Daemon parado')) + '</h3>' +
          '<p>' + (!anyAvail ? 'Instala Docker Desktop, Podman o configura WSL' : (anyUp ? 'No hay contenedores corriendo ni parados' : 'Arranca Docker Desktop / Podman para verlos aquí')) + '</p>' +
        '</div>'
      )
    }

    return (
      '<div class="infra-head">' +
        '<div class="infra-stats">' +
          '<span class="infra-stat"><b>' + all.filter(c => c.state === 'running').length + '</b><i>running</i></span>' +
          '<span class="infra-stat"><b>' + all.length + '</b><i>total</i></span>' +
        '</div>' +
        '<div class="infra-rt-pills">' + pills + '</div>' +
      '</div>' +
      '<div class="grid">' + all.map(renderContainerCard).join('') + '</div>'
    )
  }

  function onInfra(s) {
    infra = s
    const running = (s && s.runtimes) ? s.runtimes.reduce((acc, r) => acc + (r.containers || []).filter(c => c.state === 'running').length, 0) : 0
    document.getElementById('cnt-infra').textContent = running
    if (activeTab === 'infra') render()
  }

  function alertRow(a) {
    const iconMap = {
      'bot-done': '✓', 'bot-stuck': '⚠', 'bot-crashed': '✕', 'bot-anomaly': '↓',
      'project-new': '+', 'branch-stale': '⏰', 'info': 'i',
    }
    return (
      '<div class="alert-row k-' + a.kind + '">' +
        '<div class="alert-icon">' + (iconMap[a.kind] || '·') + '</div>' +
        '<div class="alert-body">' +
          '<div class="alert-title">' + escapeHtml(a.title) + '</div>' +
          '<div class="alert-msg">' + escapeHtml(a.body) + '</div>' +
        '</div>' +
        '<div class="alert-time">' + relTime(a.ts) + '</div>' +
      '</div>'
    )
  }
  async function clearAllAlerts() {
    await window.asura.clearAlerts()
    toast('alertas limpiadas')
  }
  window.clearAllAlerts = clearAllAlerts

  /* ═════════ Live data ═════════ */
  function onProjects(p) {
    projects = p || []
    document.getElementById('last-scan').textContent = new Date().toLocaleTimeString()
    render()
  }
  function onBots(b) {
    bots = b || []
    document.getElementById('cnt-bots').textContent = bots.filter(x => x.status === 'running' || x.status === 'paused' || x.status === 'idle' || x.status === 'stuck').length
    document.getElementById('s-bots').textContent = bots.filter(x => x.status === 'running').length
    if (activeTab === 'bots') render()
  }
  function onConfig(c) {
    config = c
    applyTheme(config.theme)
    document.getElementById('aot-btn').classList.toggle('active', config.alwaysOnTop)
    if (activeTab === 'alerts') render()
    document.getElementById('cnt-alerts').textContent = (config.alertsHistory || []).length
  }
  function onAlert(a) {
    if (!config) config = { alertsHistory: [] }
    if (!config.alertsHistory) config.alertsHistory = []
    config.alertsHistory.unshift(a)
    if (config.alertsHistory.length > 100) config.alertsHistory.length = 100
    document.getElementById('cnt-alerts').textContent = config.alertsHistory.length
    document.querySelector('.tab[data-tab="alerts"]').classList.add('has-alert')
    setTimeout(() => document.querySelector('.tab[data-tab="alerts"]').classList.remove('has-alert'), 4000)
    if (activeTab === 'alerts') render()
  }
  function onFocusAlert(data) {
    /* user clicked a system toast — switch to relevant tab */
    if (data.kind && data.kind.startsWith('bot-')) {
      activeTab = 'bots'
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.tab === 'bots'))
      render()
    }
  }

  window.asura.onProjects(onProjects)
  window.asura.onBots(onBots)
  window.asura.onInfra(onInfra)
  window.asura.onConfigUpdate(onConfig)
  window.asura.onAlert(onAlert)
  window.asura.onFocusAlert(onFocusAlert)
  window.asura.requestProjects()
  window.asura.requestBots()
  window.asura.requestInfra()
  window.asura.getConfig().then(onConfig)

  /* periodic bot pull */
  setInterval(() => {
    if (activeTab === 'bots') window.asura.requestBots()
  }, 5000)
  /* periodic infra pull while tab visible */
  setInterval(() => {
    if (activeTab === 'infra') window.asura.requestInfra()
  }, 3000)
</script>

</body>
</html>
