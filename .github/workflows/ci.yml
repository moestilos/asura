name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: TypeScript compile check
        run: npm run build

      - name: Verify dist output exists
        run: |
          test -f dist/main.js || (echo "ERROR: dist/main.js not found" && exit 1)
          test -f dist/actions.js || (echo "ERROR: dist/actions.js not found" && exit 1)
          test -f dist/config.js || (echo "ERROR: dist/config.js not found" && exit 1)
          echo "All expected output files present"
